rules:
  - name: Hex.pm Personal Token
    id: kingfisher.hexpm.1
    pattern: |
      (?x)
      \b
      (
        hxtp_[a-f0-9]{64}
      )
      \b
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'HEX_API_KEY=hxtp_a1b2c3d4e5f60708a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f60708a9b0c1d2'
    references:
      - https://hex.pm/docs/faq
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://hex.pm/api/auth
          headers:
            Authorization: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]

  - name: Hex.pm Workspace Token
    id: kingfisher.hexpm.2
    pattern: |
      (?x)
      \b
      (
        hxtw_[a-f0-9]{64}
      )
      \b
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'HEX_API_KEY=hxtw_a1b2c3d4e5f60708a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f60708a9b0c1d2'
    references:
      - https://hex.pm/docs/faq
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://hex.pm/api/auth
          headers:
            Authorization: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
