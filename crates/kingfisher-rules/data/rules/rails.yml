rules:
  - name: Rails Master Key
    id: kingfisher.rails.1
    pattern: |
      (?xi)
      \b
      rails[_-]?master[_-]?key
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: high
    examples:
      - "RAILS_MASTER_KEY=9a3f2c1b4e8d7f60a2b5c9d1e3f7a4b8"
      - "rails_master_key: \"4b8e2f1a9c3d6e70b2a5c8d1e4f7b3c9\""
    references:
      - https://guides.rubyonrails.org/security.html#environmental-security
    # No public validation endpoint: Rails master key is used for local
    # credential decryption and has no API to validate against.

  - name: Rails Secret Key Base
    id: kingfisher.rails.2
    pattern: |
      (?xi)
      \b
      secret[_-]?key[_-]?base
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [a-f0-9]{64,128}
      )
      \b
    pattern_requirements:
      min_digits: 8
    min_entropy: 3.8
    confidence: high
    examples:
      - "secret_key_base: \"b3d1e9f2a4c7e80b1a3c5d7e9f2a4c6e8b0d2f4a6c8e1b3d5f7a9c2e4b6d8f1a3\""
      - "SECRET_KEY_BASE=c2e4b6d8f0a1c3e5b7d9f2a4c6e8b0d2f4a6c8e1b3d5f7a9c2e4b6d8f0a1c3e5"
    references:
      - https://api.rubyonrails.org/classes/Rails/Application.html
    # No public validation endpoint: secret_key_base is used for session
    # cookie signing and has no API to validate against.
