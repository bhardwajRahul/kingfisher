rules:
  - name: AI71 API Key
    id: kingfisher.ai71.1
    pattern: |
      (?xi)
      \b
      (
        ai71-api-
        [a-f0-9]{8}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.2
    confidence: medium
    examples:
      - AI71_API_KEY=ai71-api-7c12f4e9-4b3d-4a1e-8c72-5d91a6b7c8d9
      - 'ai71_key: "ai71-api-1b9e3c7d-2f44-4ab1-9d20-6e5f7a8b9c0d"'
    references:
      - https://platform.ai71.ai/
      - https://api.ai71.ai/v1
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.ai71.ai/v1/models
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: WordMatch
              words:
                - '"data"'
