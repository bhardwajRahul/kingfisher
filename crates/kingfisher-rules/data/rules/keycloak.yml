rules:
  - name: Keycloak Client ID
    id: kingfisher.keycloak.1
    pattern: |
      (?xi)
      \b
      keycloak
      (?:.|[\n\r]){0,64}?
      \b(?:client[_-]?id|credential[_-]?client[_-]?id)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{8}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 6
    min_entropy: 3.0
    confidence: low
    visible: false
    examples:
      - "keycloak.credential.client-id=2046f7b3-b878-4bc5-8f7f-57b24ce19d85"
      - "keycloak.client-id: 1a2b3c4d-e5f6-7890-abcd-ef1234567890"
    references:
      - https://www.keycloak.org/docs-api/latest/rest-api/index.html

  - name: Keycloak Client Secret
    id: kingfisher.keycloak.2
    pattern: |
      (?xi)
      \b
      keycloak
      (?:.|[\n\r]){0,96}?
      \b(?:credentials?[._-]secret|secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{8}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 6
    min_entropy: 3.0
    confidence: medium
    examples:
      - "keycloak.credentials.secret=0aa1dabc-1d8a-4c00-85c2-82bc88c42dc7"
      - "keycloak:\n  credentials:\n    secret: 7b3e1234-abcd-4567-8901-23456789abcd"
    references:
      - https://www.keycloak.org/docs-api/latest/rest-api/index.html
    # No public validation endpoint: Keycloak is self-hosted; the realm and
    # auth-server URL are instance-specific and not publicly resolvable.
