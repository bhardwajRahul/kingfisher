rules:
  - name: Zapier Webhook URL
    id: kingfisher.zapier.1
    pattern: |
      (?x)
      \b
      (
        https://hooks\.zapier\.com/hooks/catch/
        [0-9]{5,10}
        /
        [a-z0-9]{5,12}
        /?
      )
    min_entropy: 3.4
    confidence: medium
    examples:
      - ZAPIER_WEBHOOK=https://hooks.zapier.com/hooks/catch/99999999/notalive/
      - webhook_url="https://hooks.zapier.com/hooks/catch/99999998/notlive/"
    references:
      - https://help.zapier.com/hc/en-us/articles/8496288690317-Trigger-Zaps-from-webhooks
