rules:
  - name: Xendit API Key
    id: kingfisher.xendit.1
    pattern: |
      (?x)
      \b
      (
        xnd_(?:production|development)_[A-Za-z0-9]{56,72}
      )
      (?:\b|$)
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'XENDIT_SECRET_KEY=xnd_development_A1b2C3d4E5f6G7h8J9kLmNoPqRsTuVwXyZ0123456789AbCdEfGhJkLm'
      - 'XENDIT_API_KEY="xnd_production_Z9y8X7w6V5u4T3s2R1qPoNmLkJiHgFeDcBa9876543210QwErTyUiOpLm"'
    references:
      - https://docs.xendit.co/api-integration/api-keys
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.xendit.co/balance
          headers:
            Authorization: "Basic {{ TOKEN | append: ':' | b64enc }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - 'INVALID_API_KEY'
              negative: true
