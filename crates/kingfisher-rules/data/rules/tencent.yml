rules:
  - name: Tencent Cloud Secret ID
    id: kingfisher.tencent.1
    pattern: |
      (?xi)
      \b
      tencent
      (?:.|[\n\r]){0,32}?
      \b(?:secret[_-]?id)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s>]
      \b
      (
        AKID
        [A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: low
    visible: false
    examples:
      - "tencent_secret_id => 'AKIDzODdB1nOELz0T8CEjTEkgKJOob3t2Tos'"
      - "TENCENT_SECRET_ID=AKIDaBcDeFgHiJkLmNoPqRsTuVwXyZ012345"
    references:
      - https://intl.cloud.tencent.com/product/api

  - name: Tencent Cloud Secret Key
    id: kingfisher.tencent.2
    pattern: |
      (?xi)
      \b
      tencent
      (?:.|[\n\r]){0,64}?
      \b(?:secret[_-]?key)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s>]
      \b
      (
        [A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 2
      min_lowercase: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - "tencent.secret_key => '7aHHkz236LOYu0nRuBwn5PwT0x3km7LE'"
      - "tencent\nsecret_key=AbCdEf1234GhIjKl5678MnOpQr90StUv"
    references:
      - https://intl.cloud.tencent.com/product/api
    # No simple validation: Tencent Cloud API uses TC3-HMAC-SHA256 request
    # signing. Cannot validate with a static Bearer/API-key style header.
