rules:
  - name: PingOne Client ID
    id: kingfisher.pingidentity.1
    pattern: |
      (?xi)
      \b
      ping(?:one|identity)
      (?:.|[\n\r]){0,32}?
      \b(?:client[_-]?id)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [0-9a-fA-F]{8}
        -[0-9a-fA-F]{4}
        -[0-9a-fA-F]{4}
        -[0-9a-fA-F]{4}
        -[0-9a-fA-F]{12}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - "pingone client_id = 7fe9Gf06-7F40-CE8D-6EBF-55ggFe4d9bF4"
      - "PINGONE_CLIENT_ID=8gf0Hg17-8G51-DF9E-7FCG-66hhGf5e0cG5"
    references:
      - https://docs.pingidentity.com/r/en-us/pingone/p1_c_environments

  - name: PingOne Client Secret
    id: kingfisher.pingidentity.2
    pattern: |
      (?xi)
      \b
      ping(?:one|identity)
      (?:.|[\n\r]){0,64}?
      \b(?:client[_-]?secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [A-Za-z0-9.~_-]{28,48}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 2
      min_special_chars: 1
    min_entropy: 3.0
    confidence: medium
    examples:
      - "pingone client_secret = 5dGwD6ZxOQj.~XD9Pd82I.q79zA8rSk9sscgHQ."
      - "PINGONE_CLIENT_SECRET=6eHxE7AyPRk.~YE0Qe93J.r80AB9sTo0ttdhIR."
    references:
      - https://docs.pingidentity.com/r/en-us/pingone/p1_c_environments
    # No simple validation: PingOne OAuth2 requires both client_id and
    # client_secret together for the token endpoint.
