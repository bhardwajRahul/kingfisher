rules:
  - name: WePay Access Token
    id: kingfisher.wepay.1
    pattern: |
      (?x)
      \b
      (
        (?:STAGE|PRODUCTION)_
        [0-9a-f]{60,68}
      )
      \b
    pattern_requirements:
      min_digits: 8
    min_entropy: 3.5
    confidence: high
    examples:
      - "Bearer STAGE_9b20b006c6c96547ebe6de2497ec2aaa548abd06a25c5a505eb606317b679012"
      - "WEPAY_ACCESS_TOKEN=PRODUCTION_a5512f7329063d48e00e596f1873e4a5c617dd27d73dcb77c71638b4895d0987"
      - "WEPAY_SANDBOX_ACCESS_TOKEN: STAGE_fccef80fa32e922d2191683d1d86888a3e4eabf043c136767b35a782bc8b5678"
    references:
      - https://developer.wepay.com/api/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://wepayapi.com/v2/user
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Api-Version: "3.0"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
