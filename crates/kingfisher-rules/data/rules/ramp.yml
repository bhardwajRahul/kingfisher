rules:
  - name: Ramp Client ID
    id: kingfisher.ramp.1
    pattern: |
      (?x)
      \b
      (
        ramp_id_[a-zA-Z0-9]{40}
      )
      \b
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'RAMP_CLIENT_ID=ramp_id_a1B2c3D4e5F6g7H8i9J0k1L2m3N4o5P6q7R8s9T0'
    references:
      - https://docs.ramp.com/developer-api/v1/authorization

  - name: Ramp Client Secret
    id: kingfisher.ramp.2
    pattern: |
      (?x)
      \b
      (
        ramp_sec_[a-zA-Z0-9]{48}
      )
      \b
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'RAMP_CLIENT_SECRET=ramp_sec_a1B2c3D4e5F6g7H8i9J0k1L2m3N4o5P6q7R8s9T0u1V2w3X4'
    references:
      - https://docs.ramp.com/developer-api/v1/authorization
    depends_on_rule:
      - rule_id: kingfisher.ramp.1
        variable: CLIENT_ID
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://api.ramp.com/developer/v1/token
          headers:
            Accept: application/json
            Content-Type: application/x-www-form-urlencoded
            Authorization: 'Basic {{ CLIENT_ID | append: ":" | append: TOKEN | b64enc }}'
          body: 'grant_type=client_credentials&scope=users%3Aread'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 400, 401]
            - type: JsonValid
            - type: WordMatch
              match_all_words: false
              words:
                - '"access_token"'
                - invalid_scope
                - unauthorized_client
            - type: WordMatch
              negative: true
              words:
                - invalid_client
