rules:
  - name: Hunter.io API Key
    id: kingfisher.hunterio.1
    pattern: |
      (?xi)
      \b
      hunter
      (?:.|[\n\r]){0,16}?
      (?:SECRET|PRIVATE|ACCESS|KEY|TOKEN)
      (?:.|[\n\r]){0,16}?
      \b
      (
        [A-Za-z0-9]{40}
      )
      \b
    min_entropy: 3.5
    confidence: medium
    pattern_requirements:
      min_digits: 2
      ignore_if_contains:
        - test-api-key
    examples:
      - hunter_api_key = "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6a7b8c9d0"
      - HUNTER_KEY=abcdef1234567890abcdef1234567890abcdef12
    references:
      - https://hunter.io/api/docs
      - https://hunter.io/api-keys
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.hunter.io/v2/account?api_key={{ TOKEN }}
          headers:
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
