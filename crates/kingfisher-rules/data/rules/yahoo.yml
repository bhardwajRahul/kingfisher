rules:
  - name: Yahoo OAuth2 Client ID
    id: kingfisher.yahoo.1
    pattern: |
      (?x)
      \b
      (
        dj0y
        [A-Za-z0-9_-]{60,100}
        --
      )
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: high
    visible: false
    examples:
      - "Yahoo Client ID dj0yJmk9FV44A2NEbHFtCdXkKzR9XNesQYh7WVxFWjJVcDNXcsNYctMYIT1uKqI7Y37ta4OaZYRhCFTzYYVjgF2rYA--"
      - "YAHOO_CLIENT_ID=dj0yJmk9GW55B3OFcIGnDeYlLaS0YOfTRZi8XWyGXkKWdEOYdtNZjuNZJU2vLrJ8Z48ub5PaAZSiDGU0ZWWkhG3sZB--"
    references:
      - https://developer.yahoo.com/oauth2/guide/

  - name: Yahoo OAuth2 Client Secret
    id: kingfisher.yahoo.2
    pattern: |
      (?xi)
      \b
      yahoo
      (?:.|[\n\r]){0,64}?
      \b(?:client[_-]?secret|secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [0-9a-f]{40}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - "Yahoo Client Secret 33g773dbe8bg319d86666d4b6137fg4ece272431"
      - "YAHOO_CLIENT_SECRET=44h884ecf9ch42ae97777e5c7248gh5fdf383542"
    references:
      - https://developer.yahoo.com/oauth2/guide/
    # No simple validation: Yahoo OAuth2 requires both client_id and
    # client_secret together for the token endpoint.
