rules:
  - name: Anthropic API Key
    id: kingfisher.anthropic.1
    pattern: |
      (?x)
      (
        sk-ant-api
        \d{2,4}
        -
        [\w\-]{93}
        AA
      )
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1    
    min_entropy: 3.3
    confidence: medium
    examples:
      - sk-ant-api668-Clm512odot9WDD7itfUU9R880nefA1EtYZDbpE-C9b0XQEWpqFKf9DQUo03vOfXl16oSmyar1CLF1SzV3YzpZJ6bahcpLAA
      - sk-ant-api03-gOe0gMC1pt-tUe3PC6bqj3YqGhkHvyvJgtwIjGhmQIScHCRbIinUwsgFuqyQnnaTDXrHCaTmX2GkSU117pxITQ-XhkxPAAA
    references:
      - https://docs.anthropic.com/claude/reference/authentication
    validation:
      type: Http
      content:
        request:
          body: |
            {
              "model": "claude-3-haiku-20240307",
              "max_tokens": 1024,
              "messages": [
                {"role": "user", "content": "respond only with 'success'"}
              ]
            }
          headers:
            Content-Type: application/json
            anthropic-version: "2023-06-01"
            x-api-key: '{{ TOKEN }}'
          method: POST
          response_matcher:
            - report_response: true
            - status:
                - 200
              type: StatusMatch
            - report_response: true
            - type: WordMatch
              words:
                - '"type":"message"'
                - 'credit balance is too low'
          url: https://api.anthropic.com/v1/messages

  - name: Anthropic Admin API Key
    id: kingfisher.anthropic.2
    pattern: |
      (?x)
      \b
      (
        sk-ant-admin(?:\d{2,4})?-[A-Za-z0-9_-]{92,96}
      )
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.5
    confidence: medium
    examples:
      - sk-ant-admin03-4mB9zY2Qx8LmN7pR5sT1uV6wX0aBcDeFgHiJkLmNoPqRsTuVwXyZ1234
      - sk-ant-admin01-MSLxH1vwJBWWIwDTzFro0xQrkN1dWoHo-6E9qdBHiJDCx5076IoxCH_L-sritH-zkJw2tx6igyKCh5AFgKJYYw-NjbNkAAA
    references:
      - https://docs.anthropic.com/en/api/administration-api
      - https://docs.anthropic.com/en/api/admin-api/organization/get-me
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.anthropic.com/v1/organizations/me
          headers:
            x-api-key: '{{ TOKEN }}'
            anthropic-version: "2023-06-01"
            content-type: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
