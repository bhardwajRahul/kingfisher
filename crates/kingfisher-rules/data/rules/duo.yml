rules:
  - name: Duo Security Integration Key
    id: kingfisher.duo.1
    pattern: |
      (?xi)
      \b
      (?:duo|duosecurity)
      (?:.|[\n\r]){0,64}?
      \b(?:integration[_-]?key|ikey)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [A-Z0-9]{20}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 8
    min_entropy: 3.0
    confidence: low
    visible: false
    examples:
      - "duo\nintegration_key=AMTRZFKBPWH3QNGLVWCY"
      - "duo\nikey = 'BNUSGLLCQXI4RNHMWXDZ'"
    references:
      - https://duo.com/docs/authapi

  - name: Duo Security Secret Key
    id: kingfisher.duo.2
    pattern: |
      (?xi)
      \b
      (?:duo|duosecurity)
      (?:.|[\n\r]){0,128}?
      \b(?:secret[_-]?key|skey)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [A-Za-z0-9]{40}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_uppercase: 4
      min_lowercase: 8
    min_entropy: 3.5
    confidence: medium
    examples:
      - "duo\nsecret_key=Rf14qf2wwf3pQfj4jfuipjDjpj3jfjuaqjff5uVi"
      - "duo\nskey = 'Lg4k2ffwff3pQfj4jfuipjDjpj3jgju5qjffwyCb'"
    references:
      - https://duo.com/docs/authapi
      - https://duo.com/docs/adminapi
    # No simple validation: Duo uses HMAC-SHA1 request signing.
    # Authentication requires computing a signature over request parameters
    # using the integration_key and secret_key together.
