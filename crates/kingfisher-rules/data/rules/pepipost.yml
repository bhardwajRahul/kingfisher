rules:
  - name: Pepipost API Key
    id: kingfisher.pepipost.1
    pattern: |
      (?xi)
      \b
      pepipost
      (?:.|[\n\r]){0,32}?
      (?:SECRET|PRIVATE|ACCESS|KEY|TOKEN|API)
      (?:.|[\n\r]){0,32}?
      \b
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.3
    confidence: medium
    examples:
      - 'pepipost_api_key = "216fdaeeb975729fae923d5a4fd12aab"'
      - 'Pepipost access key: fe228f219e9cb0eb53f16947ccf25ec8'
    references:
      - https://developers.pepipost.com/api/getstarted/overview/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.pepipost.com/v5.1/reports/domain
          headers:
            api_key: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
