rules:
  - name: ZeroTier API Token
    id: kingfisher.zerotier.1
    pattern: |
      (?xi)
      \b
      (?:zerotier|zt)
      (?:.|[\n\r]){0,32}?
      (?:API[_-]?(?:TOKEN|KEY)|TOKEN|SECRET|KEY|ACCESS)
      (?:.|[\n\r]){0,16}?
      \b
      (
        [A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 3
      min_uppercase: 3
      min_lowercase: 3
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'ZEROTIER_API_TOKEN=aBcDeFgHiJkLmNoPqRsTuVwXyZ012345'
      - 'ZT_TOKEN=xY9zW8vU7tS6rQ5pN4mL3kJ2iH1gF0eD'
    references:
      - https://docs.zerotier.com/api/tokens/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.zerotier.com/api/v1/status
          headers:
            Accept: application/json
            Authorization: "token {{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
