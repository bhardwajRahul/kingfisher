rules:
  - name: ClickUp Personal API Token
    id: kingfisher.clickup.1
    pattern: |
      (?xi)
      \b
      clickup
      (?:.|[\n\r]){0,32}?
      (?:API[_-]?KEY|SECRET|TOKEN|KEY)
      (?:.|[\n\r]){0,16}?
      \b
      (
        pk_[0-9]{7,9}_[0-9A-Z]{32}
      )
      \b
    pattern_requirements:
      min_digits: 8
      min_uppercase: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'CLICKUP_API_TOKEN=pk_4753994_EXP7MPOJ7XQM5UJDV2M45MPF0YHH5YHO'
      - 'clickup_token: "pk_12345678_A1B2C3D4E5F6G7H8I9J0K1L2M3N4O5P6"'
    references:
      - https://clickup.com/api/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.clickup.com/api/v2/user
          headers:
            Accept: application/json
            Authorization: "{{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
