rules:
  - name: Upstash Redis REST Token
    id: kingfisher.upstash.1
    pattern: |
      (?x)
      \b
      (?:
        UPSTASH_REDIS_REST_TOKEN
        |
        (?i:upstash)
        (?:.|[\n\r]){0,40}?
        (?i:(?:redis|rest))
        (?:.|[\n\r]){0,40}?
        (?i:token)
      )
      (?:.|[\n\r]){0,24}?
      (
        (?:
          [A-Za-z0-9]{32,48}
          |
          AYNgAS[A-Za-z0-9+/_-]{26,90}={0,2}
        )
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_lowercase: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'UPSTASH_REDIS_REST_TOKEN="2553feg6a2d9842h2a0gcdb5f8efe9934"'
      - 'upstash redis token: "AYNgAS2553feg6a2d9842h2a0gcdb5f8efe9934DQ="'
    references:
      - https://upstash.com/docs/redis/features/restapi
      - https://upstash.com/docs/redis/howto/connectwithupstashredis
    depends_on_rule:
      - rule_id: kingfisher.upstash.2
        variable: UPSTASH_REDIS_REST_URL
    validation:
      type: Http
      content:
        request:
          method: POST
          url: "{{ UPSTASH_REDIS_REST_URL }}/ping"
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - PONG
    # Upstash Redis REST tokens are database credentials; revocation is done by rotating/resetting the database token.

  - name: Upstash Redis REST URL
    id: kingfisher.upstash.2
    pattern: |
      (?xi)
      \b
      (?:UPSTASH_REDIS_REST_URL|upstash)
      (?:.|[\n\r]){0,48}?
      (
        https://[a-z0-9][a-z0-9-]{2,63}\.upstash\.io
      )
      \b
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - 'UPSTASH_REDIS_REST_URL="https://steady-cobra-12345.upstash.io"'
      - 'upstash_url=https://sharp-raven-67890.upstash.io'
    references:
      - https://upstash.com/docs/redis/features/restapi

  - name: Upstash Account Email
    id: kingfisher.upstash.3
    pattern: |
      (?xi)
      \b
      (?:
        UPSTASH_EMAIL
        |
        upstash
        (?:.|[\n\r]){0,40}?
        email
      )
      (?:.|[\n\r]){0,12}?
      (
        [A-Za-z0-9._%+\-]+
        @
        [A-Za-z0-9.\-]+\.[A-Za-z]{2,}
      )
      \b
    min_entropy: 2.0
    confidence: medium
    visible: false
    examples:
      - UPSTASH_EMAIL=agent@example.com
      - 'upstash email: "ops.bot@example.org"'
    references:
      - https://upstash.com/docs/devops/cli/overview

  - name: Upstash Management API Key
    id: kingfisher.upstash.4
    pattern: |
      (?xi)
      \b
      (?i:upstash)
      (?:.|[\n\r]){0,24}?
      \b
      (
        [0-9a-f]{8}
        -
        [0-9a-f]{4}
        -
        4[0-9a-f]{3}
        -
        [89ab][0-9a-f]{3}
        -
        [0-9a-f]{12}
      )
      \b
    min_entropy: 3.0
    confidence: medium
    examples:
      - UPSTASH_API_KEY=7e6fbb80-71d8-4f97-9b38-62c17a3de154
      - 'upstash management api key: "9d13b4f2-2d43-4378-8f32-4fca3d6be861"'
    references:
      - https://upstash.com/docs/devops/developer-api/authentication
      - https://upstash.com/docs/devops/cli/overview
    depends_on_rule:
      - rule_id: kingfisher.upstash.3
        variable: UPSTASH_EMAIL
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.upstash.com/v2/redis/databases
          headers:
            Accept: application/json
            Authorization: "Basic {{ UPSTASH_EMAIL | append: ':' | append: TOKEN | b64enc }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
    # Upstash Management API keys are created and deleted in the Upstash console; no self-revocation API is documented.
