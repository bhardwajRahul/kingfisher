rules:
  - name: VolcEngine Access Key ID
    id: kingfisher.volcengine.1
    pattern: |
      (?x)
      \b
      (
        AKLT[a-zA-Z0-9_-]{16,60}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    categories: [api, key]
    examples:
      - 'VOLCENGINE_ACCESS_KEY=AKLTabcdefghijklmnop1234567890'
    references:
      - https://www.volcengine.com/docs/6291/65568
