rules:
  - name: Nightfall AI API Key
    id: kingfisher.nightfall.1
    pattern: |
      (?x)
      \b
      (
        NF-[a-zA-Z0-9]{32}
      )
      \b
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'NIGHTFALL_API_KEY=NF-a1B2c3D4e5F6g7H8i9J0k1L2m3N4o5P6'
      - 'Authorization: Bearer NF-xK8m2LpQr5nW0vYz3cJ7aB4dE6fG8h0i'
    references:
      - https://help.nightfall.ai/developer-api/key-concepts/setup/api_key
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://api.nightfall.ai/v3/scan
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
            Content-Type: application/json
          body: '{"policy":{"detectionRules":[{"detectors":[{"minNumFindings":1,"minConfidence":"VERY_LIKELY","displayName":"US Social Security Number","detectorType":"NIGHTFALL_DETECTOR","nightfallDetector":"US_SOCIAL_SECURITY_NUMBER"}],"name":"Kingfisher Validation Rule","logicalOp":"ANY"}]},"payload":["my ssn is 458-02-6124"]}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
