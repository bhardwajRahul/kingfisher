  - name: GitLab Incoming Mail Token
    id: kingfisher.gitlab.9
    pattern: |
      (?x)
      \b
      (
        glimt-
        [0-9a-zA-Z_-]{25}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    examples:
      - glimt-xY9kLmNpQrStUvWxYz0123456
    references:
