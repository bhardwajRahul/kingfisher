  - name: GitLab Runner Authentication Token
    id: kingfisher.gitlab.12
    pattern: |
      (?x)
      \b
      (
        glrt-
        [0-9a-zA-Z_-]{20}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    examples:
      - glrt-xY9kLmNpQrStUvWxYz01
      - |
        gitlab-runner register \
        --url https://gitlab.com \
        --token glrt-3dEfGhIjK4MnOpQrStUv
    references:
      - https://docs.gitlab.com/runner/register/
    validation:
      type: Http
      content:
        request:
          method: POST
          headers:
            Content-Type: application/x-www-form-urlencoded
            Accept: application/json
          body: token={{ TOKEN }}
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: 200
            - type: WordMatch
              words:
                - '"token is missing"'
                - '"403 Forbidden"'
              negative: true
          url: https://gitlab.com/api/v4/runners/verify

  - name: GitLab Runner Authentication Token - Routable Format
    id: kingfisher.gitlab.13
    pattern: |
      (?x)
      \b
      (
        glrt-t
        \d
        _
        [0-9a-zA-Z_-]{27,300}
        \.
        [0-9a-z]{2}
        [0-9a-z]{7}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 4.0
    confidence: medium
    examples:
      - glrt-t1_xY9kLmNpQrStUvWxYz01234567890.01abc1234
    references:
      - https://docs.gitlab.com/runner/register/
    validation:
      type: Http
      content:
        request:
          method: POST
          headers:
            Content-Type: application/x-www-form-urlencoded
            Accept: application/json
          body: token={{ TOKEN }}
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: 200
            - type: WordMatch
              words:
                - '"token is missing"'
                - '"403 Forbidden"'
              negative: true
          url: https://gitlab.com/api/v4/runners/verify

  - name: GitLab SCIM Token
    id: kingfisher.gitlab.14
    pattern: |
      (?x)
      \b
      (
        glsoat-
        [0-9a-zA-Z_-]{20}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    examples:
      - glsoat-xY9kLmNpQrStUvWxYz01
    references:
      - https://docs.gitlab.com/api/scim/

  - name: GitLab Session Cookie
    id: kingfisher.gitlab.15
    pattern: |
      (?x)
      (?:^|[;\s])
      _gitlab_session=
      (
        [0-9a-f]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    examples:
      - '_gitlab_session=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6'
      - 'Cookie: _gitlab_session=0f1e2d3c4b5a69788796a5b4c3d2e1f0'
    references:
      - https://docs.gitlab.com/
