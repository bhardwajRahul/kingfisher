rules:
  - name: Trigger.dev Secret Key
    id: kingfisher.triggerdev.1
    pattern: |
      (?x)
      \b
      (
        tr_(?:dev|prod|stg)_[A-Za-z0-9]{20,40}
      )
      \b
    pattern_requirements:
      min_digits: 1
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'TRIGGER_SECRET_KEY=tr_dev_1a2b3c4d5e6f7g8h9i0j'
      - 'TRIGGER_SECRET_KEY=tr_prod_xK8m2LpQr5nW0vYz3cJ7'
    references:
      - https://trigger.dev/docs/management/authentication
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.trigger.dev/api/v1/tasks
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 401]
            - type: WordMatch
              words:
                - '"Unauthorized"'
              negative: true

  - name: Trigger.dev Personal Access Token
    id: kingfisher.triggerdev.2
    pattern: |
      (?x)
      \b
      (
        tr_pat_[A-Za-z0-9]{20,40}
      )
      \b
    pattern_requirements:
      min_digits: 1
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'TRIGGER_ACCESS_TOKEN=tr_pat_xK8m2LpQr5nW0vYz3cJ7aB4d'
    references:
      - https://trigger.dev/docs/management/authentication
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.trigger.dev/api/v1/tasks
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 401]
            - type: WordMatch
              words:
                - '"Unauthorized"'
              negative: true
