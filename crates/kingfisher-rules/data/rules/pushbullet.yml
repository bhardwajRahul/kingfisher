rules:
  - name: Pushbullet Access Token
    id: kingfisher.pushbullet.1
    pattern: |
      (?x)
      \b
      (
        o\.[A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_lowercase: 4
      min_uppercase: 1
    min_entropy: 3.6
    confidence: medium
    examples:
      - PUSHBULLET_ACCESS_TOKEN="o.a9KxT4mQp8Rw2Ls6Nd5Yf1Hg7Jc3Vz0B"
      - 'client = PushBullet("o.T3YzoJfL2PpiSk54KMTsTm9Y0VtSjhhg")'
    references:
      - https://docs.pushbullet.com/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.pushbullet.com/v2/users/me
          headers:
            Access-Token: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"iden"'
                - '"email"'
              match_all_words: true
