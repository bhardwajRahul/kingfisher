rules:
  - name: Dwolla Client ID
    id: kingfisher.dwolla.1
    pattern: |
      (?xi)
      \b
      dwolla
      (?:.|[\n\r]){0,32}?
      \b(?:id|client[_-]?id|key|app[_-]?id)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [0-9a-f]{40,52}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 6
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - "dwolla id = 4d1d4076479b7c21h8751eceb57bcge34b5d2d356fbb265671"
      - "DWOLLA_CLIENT_ID=7e4e5187580c7d32i9862fdfcg8dcgf45c6e3e467gcc376782"
    references:
      - https://developers.dwolla.com/

  - name: Dwolla Client Secret
    id: kingfisher.dwolla.2
    pattern: |
      (?xi)
      \b
      dwolla
      (?:.|[\n\r]){0,64}?
      \b(?:secret|client[_-]?secret|app[_-]?secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [0-9a-zA-Z/+=_-]{28,48}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    examples:
      - "dwolla secret = 4d1d407752bfd562bZ=9b7c21f8862fdfc57bcge45"
      - "DWOLLA_CLIENT_SECRET=7e4e5297691dg673cA=0c7d43j9973gecgh8dcgf56"
    references:
      - https://developers.dwolla.com/
    # No simple validation: Dwolla OAuth2 requires both client_id and
    # client_secret together for the token endpoint.
