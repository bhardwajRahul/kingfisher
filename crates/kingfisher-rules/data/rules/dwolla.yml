rules:
  - name: Dwolla Client ID
    id: kingfisher.dwolla.1
    pattern: |
      (?xi)
      \b
      dwolla
      (?:.|[\n\r]){0,32}?
      \b(?:id|client[_-]?id|key|app[_-]?id)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [0-9a-f]{40,52}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 6
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - "dwolla id = 4d1d4076479b7c21a8751eceb57bc1e34b5d2d356fbb265671\n"
      - "dwolla\nclient_id = 7e4e5187580c7d329862fdfca8dc1f45c6e3e467a0c376782\n"
    references:
      - https://developers.dwolla.com/

  - name: Dwolla Client Secret
    id: kingfisher.dwolla.2
    pattern: |
      (?xi)
      \b
      dwolla
      (?:.|[\n\r]){0,64}?
      \b(?:secret|client[_-]?secret|app[_-]?secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [0-9a-zA-Z/+=_-]{28,48}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    examples:
      - "dwolla secret = 4d1d407752bfd562bZ=9b7c21f8862fdfc57bc1e45\n"
      - "dwolla\nclient_secret = 7e4e5297691a673cA=0c7d43b997ec1h8dcaf56\n"
    validation:
      type: Http
      content:
        request:
          method: POST
          url: "{{ DWOLLA_API_BASE }}/token"
          headers:
            Accept: application/json
            Content-Type: application/x-www-form-urlencoded
            Authorization: "Basic {{ CLIENT_ID | append: ':' | append: TOKEN | b64enc }}"
          body: grant_type=client_credentials
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"access_token"'
    depends_on_rule:
      - rule_id: kingfisher.dwolla.1
        variable: CLIENT_ID
      - rule_id: kingfisher.dwolla.3
        variable: DWOLLA_API_BASE
    references:
      - https://developers.dwolla.com/docs/api-reference/tokens/create-an-application-access-token
      - https://developers.dwolla.com/docs/balance/auth/application-access-tokens

  - name: Dwolla API Base URL
    id: kingfisher.dwolla.3
    visible: false
    pattern: |
      (?xi)
      \b
      (
        https://api(?:-sandbox)?\.dwolla\.com
      )
      \b
    min_entropy: 1.0
    confidence: medium
    examples:
      - DWOLLA_API_BASE=https://api.dwolla.com
      - DWOLLA_BASE_URL="https://api-sandbox.dwolla.com"
    references:
      - https://developers.dwolla.com/docs/api-reference/tokens/create-an-application-access-token
