rules:
  - name: SparkPost API Key
    id: kingfisher.sparkpost.1
    pattern: |
      (?xi)
      \b
      spark(?:\s|_|-)?post
      (?:.|[\n\r]){0,24}?
      (?:api[_\s-]*key|authorization|token|secret|key)
      (?:.|[\n\r]){0,16}?
      (
        [a-f0-9]{40}
      )
      \b
    pattern_requirements:
      min_digits: 3
    min_entropy: 3.8
    confidence: medium
    examples:
      - sparkpost_api_key = "14ac5499cfdd2bb2859e4476d2e5b1d2bad079bf"
      - "\"X-Service\": \"sparkpost\",\n\"Authorization\": \"3f2c1a7b5d9e8c60124fab37d8519ce20ab46d7f\"\n"
    references:
      - https://developers.sparkpost.com/api/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.sparkpost.com/api/v1/account
          headers:
            Authorization: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"results"'
