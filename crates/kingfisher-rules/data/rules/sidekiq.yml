rules:
  - name: Sidekiq Enterprise Credential
    id: kingfisher.sidekiq.1
    pattern: |
      (?xi)
      \b
      (?:
        BUNDLE_ENTERPRISE__CONTRIBSYS__COM
      |
        BUNDLE_GEMS__CONTRIBSYS__COM
      )
      \s*[:=]\s*
      ["']?
      (
        [a-f0-9]{8}:[a-f0-9]{8}
      )
      ["']?
      \b
    pattern_requirements:
      min_digits: 4
      min_lowercase: 4
    min_entropy: 2.8
    confidence: medium
    examples:
      - BUNDLE_ENTERPRISE__CONTRIBSYS__COM=cafe1234:dead5678
      - 'export BUNDLE_GEMS__CONTRIBSYS__COM="ca1eb4b3:d3ad533f"'

  - name: Sidekiq Sensitive URL
    id: kingfisher.sidekiq.2
    pattern: |
      (?xi)
      (
        https?://
        [a-f0-9]{8}:[a-f0-9]{8}
        @
        (?:
          gems\.contribsys\.com
        |
          enterprise\.contribsys\.com
        )
        (?:
          /[^ \t\r\n"'<>]*
        |
          \?[^ \t\r\n"'<>]*
        |
          \#[^ \t\r\n"'<>]*
        |
          :[0-9]{1,5}(?:/[^ \t\r\n"'<>]*)?
        )?
      )
    pattern_requirements:
      min_digits: 4
      min_lowercase: 4
    min_entropy: 2.8
    confidence: medium
    examples:
      - https://cafe1234:dead5678@gems.contribsys.com/kingfisher-example-not-found
      - http://ca1eb4b3:d3ad533f@enterprise.contribsys.com:80/kingfisher-example-not-found?param1=true
