rules:
  - name: Vapi API Key
    id: kingfisher.vapi.1
    pattern: |
      (?xi)
      \b
      (?:vapi|api\.vapi\.ai)
      (?:.|[\n\r]){0,64}?
      (?:api[_\s-]*key|private[_\s-]*key|public[_\s-]*key|web[_\s-]*token|token|authorization)
      (?:.|[\n\r]){0,32}?
      (
        [a-f0-9]{8}
        -[a-f0-9]{4}
        -[a-f0-9]{4}
        -[a-f0-9]{4}
        -[a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'VAPI_PRIVATE_KEY="71c2a4f8-3b9d-4e70-8c15-2d8f947c5ab1"'
      - 'VAPI_BASE_URL="https://api.vapi.ai" VAPI_WEB_TOKEN="4d9b0a63-5f01-4ce2-8ab7-90df1248e6b3"'
    references:
      - https://docs.vapi.ai/api-reference
      - https://docs.vapi.ai/api-reference/assistants/list
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.vapi.ai/assistant
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
