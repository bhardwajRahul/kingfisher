rules:
  - name: Gemfury Deploy or Push Token
    id: kingfisher.gemfury.1
    pattern: |
      (?xi)
      https://
      (
        [A-Za-z0-9_-]{20,36}
      )
      @
      (?:repo|push)\.fury\.io/
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: high
    examples:
      - "extra-index-url = https://2yryChg-4CDmo6lyRtjCEpOQuHegzKAF@repo.fury.io/myuser"
      - "push_token = https://OS7Jq-grMnyU5pMtBs7btYY0LUTWgfgR@push.fury.io/myorg/"
    references:
      - https://gemfury.com/help/getting-started
    # No public validation endpoint available for Gemfury deploy tokens.

  - name: Gemfury Full Access Token
    id: kingfisher.gemfury.2
    pattern: |
      (?xi)
      https://
      (
        [A-Za-z0-9]{16,24}
      )
      :@
      (?:pypi|npm|gem|nuget)\.fury\.io/
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: high
    examples:
      - "GEMFURY_URL=https://Toqq8z53AbKDYmGcTgRb:@pypi.fury.io/myorg"
      - "GEMFURY_URL=https://Ua9vWx4yAz0BcDeFgHiJ:@npm.fury.io/myteam"
    references:
      - https://gemfury.com/help/getting-started
    # No public validation endpoint available for Gemfury full access tokens.
