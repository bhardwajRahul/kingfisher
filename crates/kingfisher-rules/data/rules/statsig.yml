rules:
  - name: Statsig Server Secret Key
    id: kingfisher.statsig.1
    pattern: |
      (?x)
      \b
      (
        secret-
        [A-Za-z0-9]{40,48}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.5
    confidence: high
    examples:
      - "STATSIG_SERVER_KEY=\"secret-K9mT4xRpWsLqZvAnBcDeFgHiJkLmNoPqRsTuVwXy\""
      - "statsig.initialize(\"secret-AbCdEfGhIjKlMnOpQrStUvWxYz0123456789ABCD\", options)"
    references:
      - https://docs.statsig.com/
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://statsigapi.net/v1/check_gate
          headers:
            STATSIG-API-KEY: "{{ TOKEN }}"
            Content-Type: application/json
          body: '{"user":{"userID":"test"},"gateName":"test_gate"}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
