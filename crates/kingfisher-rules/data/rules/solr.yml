rules:
  - name: Apache Solr Connection URI
    id: kingfisher.solr.1
    pattern: |
      (?xi)
      \b
      solr://
      ([^:@\s]{1,64})
      :
      ([^@\s]{6,128})
      @
      [^\s/"']{4,128}
    pattern_requirements:
      min_digits: 2
    min_entropy: 2.5
    confidence: medium
    examples:
      - "SOLR_URL=solr://admin:s3cureP4ss@solr.example.com:8983/solr"
      - "solr://root:Tr0ub4dor3@192.168.1.100:8983/mycore"
    references:
      - https://lucene.apache.org/solr/guide/
    # No public validation endpoint: Solr is self-hosted;
    # the host and port are instance-specific.
