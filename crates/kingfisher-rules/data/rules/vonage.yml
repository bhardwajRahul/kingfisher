rules:
  - name: Vonage (Nexmo) API Key
    id: kingfisher.vonage.1
    pattern: |
      (?xi)
      \b
      (?:nexmo|vonage)
      (?:.|[\n\r]){0,32}?
      \bapi[_-]?key\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{8}
      )
      \b
    pattern_requirements:
      min_digits: 3
    min_entropy: 2.5
    confidence: low
    visible: false
    examples:
      - "nexmo_api_key = '864919f3'"
      - "VONAGE_API_KEY=a1b2c3d4"
    references:
      - https://developer.vonage.com/en/getting-started/overview

  - name: Vonage (Nexmo) API Secret
    id: kingfisher.vonage.2
    pattern: |
      (?xi)
      \b
      (?:nexmo|vonage)
      (?:.|[\n\r]){0,96}?
      \bapi[_-]?secret\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [A-Za-z0-9]{16}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.2
    confidence: medium
    examples:
      - "nexmo api_secret='bjrDnPt67HrfVjzD'"
      - "vonage\napi_secret=K9mT4xRpWsLqZvAn"
    references:
      - https://developer.vonage.com/en/getting-started/overview
      - https://developer.nexmo.com/api/account#secret-management
    depends_on_rule:
      - rule_id: kingfisher.vonage.1
        variable: VONAGE_API_KEY
    validation:
      type: Http
      content:
        request:
          method: GET
          url: "https://rest.nexmo.com/account/get-balance?api_key={{ VONAGE_API_KEY }}&api_secret={{ TOKEN }}"
          headers:
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: WordMatch
              words:
                - '"value"'
    revocation:
      type: Http
      content:
        request:
          method: DELETE
          url: "https://rest.nexmo.com/accounts/{{ VONAGE_API_KEY }}/secrets/{{ TOKEN }}"
          headers:
            Accept: application/json
          response_matcher:
            - type: StatusMatch
              status: [204]
