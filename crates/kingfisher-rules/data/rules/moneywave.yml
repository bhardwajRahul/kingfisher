rules:
  - name: Moneywave / Flutterwave Private Key
    id: kingfisher.moneywave.1
    pattern: |
      (?x)
      \b
      (
        ts_
        [A-Z0-9]{28,34}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 10
    min_entropy: 3.5
    confidence: high
    examples:
      - "privatekey => 'ts_ZB4EJCXOD6LX5IKHVMR6C7AGUY0B'"
      - "MONEYWAVE_KEY=ts_AC1DFKWPE7MY6JIKVNS7D8BHWZ1C"
    references:
      - https://flutterwave.com/us/developers
    # No public validation endpoint available.
