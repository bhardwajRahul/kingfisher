rules:
  - name: FullContact API Key
    id: kingfisher.fullcontact.1
    pattern: |
      (?xi)
      (?:
        \bfullcontact\b
        (?:.|[\n\r]){0,64}?
        |
        \bx-fullcontact-apikey\b
        (?:.|[\n\r]){0,16}?
      )
      \b
      (
        [A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_uppercase: 4
      min_lowercase: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'fullcontact_api_key = "u8jzPde0IgxLd6GncfBAepfJBd0Kh8oO"'
      - 'X-FullContact-APIKey: OL8dKLzdocJ2isAjIhKtJ0RlgLKOmxgJ'
    references:
      - https://platform.fullcontact.com/docs/apis/enrich/authorization
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://api.fullcontact.com/v3/person.enrich
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Content-Type: application/json
            Accept: application/json
          body: '{"email":"test@example.com"}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 404]
            - type: StatusMatch
              status: [401, 403]
              negative: true
