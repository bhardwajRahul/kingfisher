rules:
  - name: Voiceflow API Key
    id: kingfisher.voiceflow.1
    pattern: |
      (?xi)
      \b
      (
        VF\.(?:(?:DM|WS)\.)
        [0-9a-f]{24}
        \.
        [0-9a-zA-Z]{16}
      )
      \b
    pattern_requirements:
      min_digits: 3
      min_lowercase: 4
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'VOICEFLOW_API_KEY=VF.DM.6421e3d5b1e4a9001d2b7c8f.a1B2c3D4e5F6g7H8'
      - 'voiceflow_key: "VF.WS.53a1b2c3d4e5f6001a2b3c4d.xY9zW8vU7tS6rQ5p"'
    references:
      - https://developer.voiceflow.com/reference/overview
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://general-runtime.voiceflow.com/knowledge-base/query
          headers:
            Accept: application/json
            Authorization: "{{ TOKEN }}"
            Content-Type: application/json
          body: |
            {"question": "test"}
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 400, 404]
            - type: WordMatch
              negative: true
              words:
                - '"Unauthorized"'
