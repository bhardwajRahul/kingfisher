rules:
  - name: Voiceflow API Key
    id: kingfisher.voiceflow.1
    pattern: |
      (?xi)
      \b
      (
        VF\.DM\.
        [0-9a-f]{24}
        \.
        [0-9a-zA-Z]{16}
      )
      \b
    pattern_requirements:
      min_digits: 3
      min_lowercase: 4
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'VOICEFLOW_API_KEY=VF.DM.6421e3d5b1e4a9001d2b7c8f.a1B2c3D4e5F6g7H8'
      - 'voiceflow_key: "VF.DM.53a1b2c3d4e5f6001a2b3c4d.xY9zW8vU7tS6rQ5p"'
    references:
      - https://developer.voiceflow.com/reference/overview
      - https://developer.voiceflow.com/api-reference/authentication
    depends_on_rule:
      - rule_id: kingfisher.voiceflow.2
        variable: VOICEFLOW_PROJECT_ID
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.voiceflow.com/v2/versions/development/export?prototype=true
          headers:
            Accept: application/json
            Authorization: "{{ TOKEN }}"
            projectID: "{{ VOICEFLOW_PROJECT_ID }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"programs"'
                - '"_id"'
    # Voiceflow documents key rotation in the dashboard, but not a same-key revocation endpoint.

  - name: Voiceflow Project ID
    id: kingfisher.voiceflow.2
    pattern: |
      (?xi)
      \b
      (?:VOICEFLOW_PROJECT_ID|projectID|project_id|voiceflow \s+ project \s+ id)
      (?:.|[\n\r]){0,48}?
      (
        [0-9a-f]{24}
      )
      \b
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - 'VOICEFLOW_PROJECT_ID=63204daf2c4a550006873771'
      - 'projectID: "63204daf2c4a550006873771"'
    references:
      - https://docs.voiceflow.com/reference/project-ids-and-versions
