rules:
  - name: Pusher Channels App Key
    id: kingfisher.pusher.1
    pattern: |
      (?xi)
      \b
      (?:pusher|beams|chatkit|channels)
      (?:.|[\n\r]){0,32}?
      \b(?:app[_-]?key|key)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{20}
      )
      \b
    pattern_requirements:
      min_digits: 3
    min_entropy: 2.8
    confidence: low
    visible: false
    examples:
      - "PUSHER_APP_KEY=d93e7eade548d00e7755"
      - "pusher_app_key: 'a1b2c3d4e5f678901234'"
    references:
      - https://pusher.com/docs/channels/server_api/overview

  - name: Pusher Channels App Secret
    id: kingfisher.pusher.2
    pattern: |
      (?xi)
      \b
      (?:pusher|beams|chatkit|channels)
      (?:.|[\n\r]){0,64}?
      \b(?:app[_-]?secret|secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{20}
      )
      \b
    pattern_requirements:
      min_digits: 3
    min_entropy: 2.8
    confidence: medium
    examples:
      - "pusher\napp_secret=4dc86652b4f69252461e"
      - "pusher.secret = 'a1b2c3d4e5f678901234'"
    references:
      - https://pusher.com/docs/channels/server_api/overview
      - https://pusher.com/docs/channels/server_api/authorizing-users/
