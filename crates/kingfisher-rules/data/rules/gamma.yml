rules:
  - name: Gamma API Key
    id: kingfisher.gamma.1
    pattern: |
      (?x)
      \b
      (
        sk-gamma-
        [A-Za-z0-9_-]{8}
        (?:[A-Za-z0-9_-]{8}){3,7}
      )
      \b
    confidence: medium
    min_entropy: 3.5
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://public-api.gamma.app/v1.0/themes?limit=1
          headers:
            X-API-KEY: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: WordMatch
              words:
                - '"data"'
                - '"hasMore"'
              match_all_words: true
    references:
      - https://developers.gamma.app/readme
      - https://developers.gamma.app/docs/workspace/list-themes
    examples:
      - 'GAMMA_API_KEY="sk-gamma-a1b2c3d4E5f6g7h8I9j0k1l2M3n4o5p6"'
