rules:
  - name: InfluxDB API Token
    id: kingfisher.influxdb.1
    pattern: |
      (?xi)
      (?:
        \binflux(?:db)?\b
        (?:.|[\n\r]){0,64}?
        \b(?:token|api[_-]?key)\b
        (?:.|[\n\r]){0,32}?
      )
      [=:"'\s]
      (
        [A-Za-z0-9+/=_-]{88,}
      )
    pattern_requirements:
      min_digits: 4
      min_uppercase: 2
      min_lowercase: 2
    min_entropy: 4.0
    confidence: medium
    examples:
      - 'INFLUX_TOKEN=nxft2SEGZrEH2-jwDIea6tDSiX6TqHn50u0kOcDqSRnUdnK35VYauC1buWdwh-UFq7dgeb7qf3pMyKg6sbf6zg=='
      - "INFLUX_TOKEN='z62qZYqGCOCI1zx3cFZYFcosWJoGw9XKIeEcF_GWwhfefRBSMjQfl3M5-ZDZN1FOFvWJPJHVi2-bZ6hPaQWvpw=='"
    references:
      - https://docs.influxdata.com/
      - https://docs.influxdata.com/influxdb/cloud/security/tokens/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://us-east-1-1.aws.cloud2.influxdata.com/api/v2/orgs
          headers:
            Authorization: "Token {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
