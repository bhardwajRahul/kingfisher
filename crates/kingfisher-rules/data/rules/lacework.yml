rules:
  - name: Lacework API Key ID
    id: kingfisher.lacework.1
    pattern: |
      (?xi)
      \b
      lacework[_-]?api[_-]?key
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [A-Z0-9_]{24,60}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 4
      min_uppercase: 8
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - "lacework_api_key = \"DEVACCT_B2849286C1644991C28692DF7C5EG973BA0BB848B6DD303D\""
      - "LACEWORK_API_KEY=PRODACCT_E1F2A3B4C5D6789012345ABCDEF012345678901234"
    references:
      - https://docs.lacework.com/api/api-access-keys-and-tokens

  - name: Lacework API Secret
    id: kingfisher.lacework.2
    pattern: |
      (?xi)
      \b
      lacework[_-]?api[_-]?secret
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        _[a-z0-9]{31}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: high
    examples:
      - "lacework_api_secret = \"_c7df6ee56c7cf8603854g3i1j2k4m5n6\""
      - "LACEWORK_API_SECRET=_a4d3e2f1b7c8e5d294963h2i1j3k4l5m6"
    references:
      - https://docs.lacework.com/api/api-access-keys-and-tokens
    # No simple validation: Lacework API requires both the API key and secret
    # to obtain an access token. Cannot validate with a single credential.
