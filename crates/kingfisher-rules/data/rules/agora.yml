rules:
  - name: Agora App ID
    id: kingfisher.agora.1
    pattern: |
      (?xi)
      \b
      agora
      (?:.|[\n\r]){0,32}?
      \b(?:app[_-]?id|customer[_-]?id)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - AGORA_APP_ID=78b8de76d5678a6feb2605721c0aefbe
      - 'agora_app_id = "cf80de76d5430a6fbc2605721c0aefbe"'
    references:
      - https://docs.agora.io/en/rtc/restfulapi

  - name: Agora App Certificate
    id: kingfisher.agora.2
    pattern: |
      (?xi)
      \b
      agora
      (?:.|[\n\r]){0,64}?
      \b(?:app[_-]?certificate|app[_-]?secret|customer[_-]?secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: medium
    examples:
      - "agora.app_certificate=397a3af3db1950bdbd84f4e4ec18ebef"
      - "agora.app_secret = \"127a3af3db1950b8dbd4fe440c28ebef\""
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.agora.io/dev/v1/projects
          headers:
            Accept: application/json
            Authorization: "Basic {{ AGORA_ID | append: ':' | append: TOKEN | b64enc }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              match_all_words: false
              words:
                - '"projects"'
                - '"vendor_key"'
    depends_on_rule:
      - rule_id: kingfisher.agora.1
        variable: AGORA_ID
    references:
      - https://docs.agora.io/en/voice-calling/reference/agora-console-rest-api
      - https://docs.agora.io/en/rtc/restfulapi
