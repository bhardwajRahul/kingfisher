rules:
  - name: OpenVSX Access Token
    id: kingfisher.openvsx.1
    pattern: |
      (?x)
      \b
      (
        (?:ovsxat|ovsxp)_[a-f0-9]{8}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}
      )
      \b
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'OVSX_PAT=ovsxat_7c1cdc14-260b-4e40-b5e4-38372be59a13'
      - 'OVSX_PAT=ovsxp_89abcdef-0123-4abc-8def-0123456789ab'
    references:
      - https://github.com/eclipse/openvsx/wiki/Publishing-Extensions
