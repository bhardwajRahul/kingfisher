rules:
  - name: Kubernetes API Server URL
    id: kingfisher.kubernetes.1
    pattern: |
      (?xi)
      \b
      (?:
        server
      |
        kube(?:rnetes)?(?:_api)?_server
      |
        api_server
      )
      \s*[:=]\s*
      ["']?
      (
        https://
        (?:
          \[[0-9a-f:.]+\]
        |
          [a-z0-9]
          [a-z0-9.-]{1,253}
        )
        (?::\d{2,5})?
      )
      ["']?
    min_entropy: 2.0
    confidence: medium
    visible: false
    examples:
      - "server: https://10.96.0.1:443"
      - KUBE_API_SERVER=https://api.cluster.example.com:6443
    references:
      - https://kubernetes.io/docs/reference/access-authn-authz/authentication/

  - name: Kubernetes Bootstrap Token
    id: kingfisher.kubernetes.2
    pattern: |
      (?xi)
      \b
      (?:
        bootstrap(?:[-_ ]token)?
      |
        tls[-_ ]bootstrap[-_ ]token
      )
      (?:.|[\n\r]){0,12}?
      (
        [a-z0-9]{6}
        \.
        [a-z0-9]{16}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.2
    confidence: medium
    examples:
      - BOOTSTRAP_TOKEN=be8dfd.da8a689a46edc282
      - --tls-bootstrap-token abcdef.1234567890abcdef
    references:
      - https://kubernetes.io/docs/reference/access-authn-authz/bootstrap-tokens/
    depends_on_rule:
      - rule_id: kingfisher.kubernetes.1
        variable: KUBE_API_SERVER
    validation:
      type: Http
      content:
        request:
          method: GET
          url: '{{ KUBE_API_SERVER }}/api/v1/namespaces?limit=1'
          headers:
            Accept: application/json
            Authorization: 'Bearer {{ TOKEN }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 403]
            - type: JsonValid

  - name: Kubernetes Bootstrap Token Pair
    id: kingfisher.kubernetes.3
    pattern: |
      (?xis)
      \btoken-id\b
      \s*:\s*
      (?P<TOKEN_ID>[a-z0-9]{6})
      (?:.|[\n\r]){0,24}?
      \btoken-secret\b
      \s*:\s*
      (?P<TOKEN_SECRET>[a-z0-9]{16})
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 2.8
    confidence: medium
    examples:
      - |
        token-id: 07402b
        token-secret: f395accd245ae53d
    references:
      - https://kubernetes.io/docs/reference/access-authn-authz/bootstrap-tokens/
    depends_on_rule:
      - rule_id: kingfisher.kubernetes.1
        variable: KUBE_API_SERVER
    validation:
      type: Http
      content:
        request:
          method: GET
          url: '{{ KUBE_API_SERVER }}/api/v1/namespaces?limit=1'
          headers:
            Accept: application/json
            Authorization: 'Bearer {{ TOKEN_ID }}.{{ TOKEN_SECRET }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 403]
            - type: JsonValid
