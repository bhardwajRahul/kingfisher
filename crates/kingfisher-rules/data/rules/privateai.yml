rules:
  - name: Private AI API Key
    id: kingfisher.privateai.1
    pattern: |
      (?xi)
      \b
      (?:
        private[_-]?ai
      |
        limina
      )
      (?:.|[\n\r]){0,32}?
      (?:
        api[_-]?key
      |
        x-api-key
      |
        token
      )
      (?:.|[\n\r]){0,12}?
      (
        [a-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_lowercase: 8
      ignore_if_contains:
        - example
        - placeholder
        - insert
        - your
    min_entropy: 3.5
    confidence: medium
    examples:
      - PRIVATEAI_API_KEY=4fa2d7c81be9063d4ea8bc1f6d2a7e9c
      - 'privateai_x_api_key: 2ab4d6e8f0c1a3b5d7e9f1a2b4c6d8e0'
    references:
      - https://docs.private-ai.com/fundamentals/getting-started
      - https://docs.private-ai.com/reference/4.0.0/operation/ner_text_ner_text_post/
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://api.private-ai.com/community/v4/process/text
          headers:
            Content-Type: application/json
            x-api-key: '{{ TOKEN }}'
          body: '{"text":["Hello Jane Doe"]}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"processed_text"'
