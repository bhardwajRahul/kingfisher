rules:
  - name: Pangea Service Token
    id: kingfisher.pangea.1
    pattern: |
      (?x)
      \b
      (
        pts_[a-z0-9]{20,60}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.5
    confidence: high
    categories: [api, key]
    examples:
      - 'PANGEA_TOKEN=pts_gqmqvvxk4yhirapuhw6bs7nswu'
      - 'pangea_token: pts_hpbc3klkkq54tigu4osc5eygthxps6vf'
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://audit.aws.us.pangea.cloud/v1/log
          headers:
            Authorization: Bearer {{ TOKEN }}
            Content-Type: application/json
          body: '{"event":{"message":"test"}}'
          response_matcher:
            - report_response: true
            - type: JsonValid
            - type: WordMatch
              words:
                - '"status":"Unauthorized"'
                - '"status":"NotAuthorized"'
                - '"status":"Forbidden"'
              negative: true
    references:
      - https://pangea.cloud/docs/
