rules:
  - name: Twitch API Token
    id: kingfisher.twitch.1
    pattern: |
      (?xi)
      \b
      twitch
      (?:.|[\n\r]){0,32}?
      \b
      (
        [a-z0-9]{30}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.5
    confidence: medium
    examples:
      - TWITCH_TOKEN=abCDefghijklmnopqrstuvwx123456
      - "twitch_api_token: '0123456789ABcdefghijklmnopqrst'"
    references:
      - https://dev.twitch.tv/docs/authentication/validate-tokens/
      - https://dev.twitch.tv/docs/authentication/revoke-tokens/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://id.twitch.tv/oauth2/validate
          headers:
            Authorization: 'OAuth {{ TOKEN }}'
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
    revocation:
      type: HttpMultiStep
      content:
        steps:
          - name: lookup_client_id
            request:
              method: GET
              url: https://id.twitch.tv/oauth2/validate
              headers:
                Authorization: 'OAuth {{ TOKEN }}'
                Accept: application/json
              response_matcher:
                - type: StatusMatch
                  status: [200]
                - type: JsonValid
            extract:
              CLIENT_ID:
                type: JsonPath
                path: "$.client_id"

          - name: revoke_token
            request:
              method: POST
              url: https://id.twitch.tv/oauth2/revoke
              headers:
                Content-Type: application/x-www-form-urlencoded
              body: "client_id={{ CLIENT_ID | url_encode }}&token={{ TOKEN | url_encode }}"
              response_matcher:
                - report_response: true
                - type: StatusMatch
                  status: [200]
