rules:
  - name: Convex Deploy Key
    id: kingfisher.convex.1
    pattern: |
      (?x)
      \b
      (?i:convex|CONVEX_DEPLOY_KEY)
      (?:.|[\n\r]){0,32}?
      (
        (?:
          (?:prod|dev):[a-z]+-[a-z]+-\d+
          |
          (?:preview|project):[a-z0-9-]+:[a-z0-9-]+
        )
        \|eyJ[A-Za-z0-9\/._=-]{20,64}
      )
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'CONVEX_DEPLOY_KEY=prod:qualified-jaguar-123|eyJhbGciOiJIUzI1NiJ9.eyJpc3MiOiIwMThmNmY5NThmNTI3NjkwYjE1M2NkNDMiLCJpYXQiOjE3MjQ3NzA4MTJ9.bQkJz3sXt'
      - 'CONVEX_DEPLOY_KEY=preview:my-team:my-project|eyJ2ZXIiOiIxIiwiYWxnIjoiSFMyNTYifQ.eyJpc3MiOiJjb252ZXgifQ.dGVzdA=='
      - 'CONVEX_DEPLOY_KEY=project:my-team:my-project|eyJ2ZXIiOiIxIiwiYWxnIjoiSFMyNTYifQ.eyJpc3MiOiJjb252ZXgifQ.dGVzdA=='
    references:
      - https://docs.convex.dev/cli/deploy-key-types

  - name: Convex Management Access Token
    id: kingfisher.convex.2
    pattern: |
      (?x)
      \b
      (?i:convex|CONVEX_TEAM_ACCESS_TOKEN|CONVEX_PAT)
      (?:.|[\n\r]){0,32}?
      \b
      (
        eyJ2MiI6I[A-Za-z0-9+\/]{46}=
      )
    min_entropy: 3.5
    confidence: medium
    categories: [api, key]
    examples:
      - 'CONVEX_TEAM_ACCESS_TOKEN=eyJ2MiI6IjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVmIn0='
      - 'CONVEX_PAT=eyJ2MiI6IjE1MDVkZTcxMTVjMzRlMWM5Yjg3Y2VlMGQ2NzgxNGUzIn0='
    references:
      - https://docs.convex.dev/platform-apis
      - https://docs.convex.dev/management-api
      - https://docs.convex.dev/management-api/get-token-details
      - https://docs.convex.dev/management-api/delete-personal-access-token
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.convex.dev/v1/token_details
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200, 403]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"AuthenticationFailed"'
              negative: true
            - type: WordMatch
              words:
                - '"AccessTokenInvalid"'
              negative: true
    # Convex PATs can be deleted with /delete_personal_access_token by passing the
    # encoded token secret, but team access tokens share the same observed format
    # and are not revocable through that endpoint, so no generic revocation is added.
