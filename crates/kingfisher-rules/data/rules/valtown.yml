rules:
  - name: Val Town API Token
    id: kingfisher.valtown.1
    pattern: |
      (?x)
      \b
      (
        vtwn_[a-zA-Z0-9_-]{20,80}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.5
    confidence: high
    categories: [api, key]
    examples:
      - 'VALTOWN_TOKEN=vtwn_AbCdEfGhIjKlMnOpQrStUvWxYz123456'
    references:
      - https://docs.val.town/api/authentication/
