rules:
  - name: Unsplash Access Key
    id: kingfisher.unsplash.1
    pattern: |
      (?xi)
      \b
      unsplash
      (?:.|[\n\r]){0,32}?
      \b
      (
        [A-Za-z0-9_]{43}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'UNSPLASH_ACCESS_KEY="Ab1Cd2Ef3Gh4Ij5Kl6Mn7Op8Qr9St0UvWxYz1234567"'
      - |
        unsplash_client_id = 'a1B2c3D4e5F6g7H8i9J0k1L2m3N4o5P6q7R8s9T0u1V'
    negative_examples:
      - 'UNSPLASH_URL="https://api.unsplash.com"'
    references:
      - https://unsplash.com/documentation
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.unsplash.com/photos?page=1&per_page=1
          headers:
            Accept-Version: v1
            Authorization: 'Client-ID {{ TOKEN }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
