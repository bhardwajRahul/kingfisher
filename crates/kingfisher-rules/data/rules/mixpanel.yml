rules:
  - name: Mixpanel API Secret
    id: kingfisher.mixpanel.1
    pattern: |
      (?xis)
      \b
      mixpanel
      .{0,32}?
      (?:SECRET|API.?SECRET|API.?KEY|PROJECT.?SECRET|TOKEN)
      .{0,32}?
      \b
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_lowercase: 2
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'MIXPANEL_API_SECRET="a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"' # nosemgrep
      - 'MIXPANEL_API_KEY="0fff5f614cbcafefb9c1ba319b9905d2"' # nosemgrep
      - "Mixpanel SECRET Token\na2813cd4502f94a77de470f2d7adc8d7" # nosemgrep
    negative_examples:
      - 'MIXPANEL_URL="https://api.mixpanel.com"'
      - 'mixpanel_project_id=12345'
    references:
      - https://developer.mixpanel.com/reference/authentication
      - https://developer.mixpanel.com/reference/overview
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://mixpanel.com/api/app/me
          headers:
            Authorization: 'Basic {{ TOKEN | append: ":" | b64enc }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid

  - name: Mixpanel Service Account Secret
    id: kingfisher.mixpanel.2
    pattern: |
      (?xs)
      mp-service-account
      .{0,64}?
      \b
      (
        [A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 2
      min_lowercase: 2
    min_entropy: 3.5
    confidence: medium
    examples:
      - "kingfisher-svc-1.b500ae.mp-service-account\nSecret: Vqprs8MMJm3XSpfWiuAFECFuyKxxrJL1" # nosemgrep
    negative_examples:
      - mp-service-account
      - "mp-service-account\nsecret: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6" # nosemgrep
    references:
      - https://developer.mixpanel.com/reference/service-accounts
    depends_on_rule:
      - rule_id: kingfisher.mixpanel.4
        variable: SVC_USERNAME
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://mixpanel.com/api/app/me
          headers:
            Authorization: 'Basic {{ SVC_USERNAME | append: ":" | append: TOKEN | b64enc }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid

  - name: Mixpanel API Key or Secret
    id: kingfisher.mixpanel.3
    pattern: |
      (?xis)
      \b API \s+ (?:Key|Secret) \b
      .{0,20}?
      \b
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_lowercase: 2
    min_entropy: 3.5
    confidence: medium
    examples:
      - "API Key\n0fff5f614cbcafefb9c1ba319b9905d2" # nosemgrep
      - "API Secret\na2813cd4502f94a77de470f2d7adc8d7" # nosemgrep
    references:
      - https://developer.mixpanel.com/reference/authentication
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.mixpanel.com/import
          headers:
            Authorization: 'Basic {{ TOKEN | append: ":" | b64enc }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [400]
            - type: JsonValid

  - name: Mixpanel Service Account Username
    id: kingfisher.mixpanel.4
    pattern: |
      (?x)
      \b
      (
        [a-zA-Z0-9_-]+ \. [0-9a-f]{6} \. mp-service-account
      )
      \b
    pattern_requirements:
      min_digits: 1
      min_lowercase: 1
    min_entropy: 2.5
    confidence: medium
    visible: false
    examples:
      - 'MIXPANEL_USERNAME=kingfisher-svc-1.b500ae.mp-service-account'
      - 'kingfisher-svc-2.6c6256.mp-service-account'
    references:
      - https://developer.mixpanel.com/reference/service-accounts
