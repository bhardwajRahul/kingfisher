rules:
  - name: Kraken API Secret
    id: kingfisher.kraken.1
    pattern: |
      (?xi)
      \b
      kraken
      (?:.|[\n\r]){0,32}?
      (?:
        api[_-]?secret |
        secret |
        private[_-]?key |
        token
      )
      (?:.|[\n\r]){0,12}?
      (
        [A-Za-z0-9+/=_-]{80,90}
      )
      (?:[^A-Za-z0-9+/=_-]|$)
    pattern_requirements:
      min_digits: 4
      min_uppercase: 2
      min_lowercase: 8
    min_entropy: 4.0
    confidence: medium
    examples:
      - KRAKEN_API_SECRET=dGhpcy1sb29rcy1saWtlLWEtYmFzZTY0LWtyYWtlbi1zZWNyZXQtdGhhdC1pcy1sb25nLWVub3VnaA==
      - kraken_secret="Aq1Bq2Cr3Ds4Et5Fu6Gv7Hw8Ix9Jy0Kz1La2Mb3Nc4Od5Pe6Qf7Rg8Sh9Ti0Uj1Vk2Wm3Xn4Yo5Za6Bc7"
    validation:
      type: Raw
      content: kraken
    depends_on_rule:
      - rule_id: kingfisher.kraken.2
        variable: KRAKEN_API_KEY
    references:
      - https://docs.kraken.com/api/docs/guides/spot-rest-auth/
      - https://docs.kraken.com/api/docs/rest-api/get-account-balance/

  - name: Kraken API Key
    id: kingfisher.kraken.2
    pattern: |
      (?xi)
      \b
      kraken
      (?:.|[\n\r]){0,32}?
      (?:
        api[_-]?key |
        key |
        public[_-]?key
      )
      (?:.|[\n\r]){0,12}?
      (
        [A-Za-z0-9]{16,64}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 4
      ignore_if_contains:
        - your_api_key
        - xxxxxx
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - KRAKEN_API_KEY=Ab12Cd34Ef56Gh78Ij90Kl12Mn34Op56
      - 'kraken_key: 5A6b7C8d9E0f1G2h3I4J5K6L7M8N9P0Q'
    references:
      - https://docs.kraken.com/api/docs/guides/spot-rest-auth/
