rules:
  - name: Fernet Symmetric Encryption Key
    id: kingfisher.fernet.1
    pattern: |
      (?xi)
      \b
      (?:fernet[_-]?key|AIRFLOW__CORE__FERNET_KEY)
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [A-Za-z0-9_-]{43}=
      )
      ['"\s]
    pattern_requirements:
      min_digits: 2
      min_uppercase: 2
    min_entropy: 3.5
    confidence: high
    examples:
      - "AIRFLOW__CORE__FERNET_KEY=gAAAAAB_AbCdEfGhIjKlMnOpQrStUvWxYz1234567890AA="
      - "fernet_key = 'xK9mP2qRsT4wY6zA1cD3eF5gH7iJ0kLmN8oP+Q2rS5tU='"
    references:
      - https://cryptography.io/en/latest/fernet/
      - https://airflow.apache.org/docs/apache-airflow/stable/security/secrets/fernet.html
    # No public validation endpoint: Fernet keys are symmetric encryption
    # keys used locally; there is no API to validate them against.
