rules:
  - name: Moralis API Key
    id: kingfisher.moralis.1
    pattern: |
      (?xi)
      \b
      moralis
      (?:.|[\n\r]){0,32}?
      (?:API[_-]?KEY|SECRET|TOKEN|KEY|WEB3)
      (?:.|[\n\r]){0,16}?
      \b
      (
        [0-9a-zA-Z]{64}
      )
      \b
    pattern_requirements:
      min_digits: 3
      min_uppercase: 3
      min_lowercase: 3
    min_entropy: 4.0
    confidence: medium
    examples:
      - 'MORALIS_API_KEY=aBcDeFgHiJkLmNoPqRsTuVwXyZ0123456789aBcDeFgHiJkLmNoPqRsTuVwXy012'
    references:
      - https://docs.moralis.io/web3-data-api/evm/reference
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://deep-index.moralis.io/api/v2.2/web3/version
          headers:
            Accept: application/json
            X-API-Key: "{{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
