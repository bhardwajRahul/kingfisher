rules:
  - name: Bunny.net API Key
    id: kingfisher.bunnynet.1
    pattern: |
      (?xi)
      \b
      (?:bunny(?:\.net)?|api\.bunny\.net)
      (?:.|[\n\r]){0,40}?
      (?:access[_\s-]*key|accesskey|api[_\s-]*key|token|key)
      (?:.|[\n\r]){0,24}?
      (
        [a-f0-9]{8}
        -[a-f0-9]{4}
        -[a-f0-9]{4}
        -[a-f0-9]{4}
        -
        (?:
          [a-f0-9]{12}
          |
          [a-f0-9]{20}(?:-[a-f0-9]{4}){3}-[a-f0-9]{12}
        )
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.2
    confidence: medium
    examples:
      - 'BUNNY_API_KEY="19f4c2ab-7d30-4e85-91bc-0d4a8f7e2c61"'
      - 'bunny_access_key = "7a3c2d18-4f90-4b6e-83ad-12f0ab34cd56ef78ab90-1d2c-4a7b-8e9f-1234567890ab"'
    references:
      - https://docs.bunny.net/api-reference/core/pull-zone/list-pull-zones
      - https://docs.bunny.net/api-reference/overview
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.bunny.net/pullzone
          headers:
            AccessKey: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
