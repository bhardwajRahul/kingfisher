rules:
  - name: Inngest Signing Key
    id: kingfisher.inngest.1
    pattern: |
      (?x)
      \b
      (
        signkey-[a-z0-9_-]+-[a-f0-9]{64}
      )
      \b
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'INNGEST_SIGNING_KEY=signkey-prod-b2ed992186a5cb19f6668aade821f502c1d00970dfd0e35128d51bac4649916c'
      - 'INNGEST_SIGNING_KEY="signkey-staging-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"'
    references:
      - https://www.inngest.com/docs/platform/signing-keys
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.inngest.com/v1/webhooks
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
            - type: JsonValid

  - name: Inngest Event Key
    id: kingfisher.inngest.2
    pattern: |
      (?xi)
      \b
      (?:inngest|INNGEST_EVENT_KEY)
      (?:.|[\n\r]){0,48}?
      \b
      (?:EVENT(?:[\s_-]*KEY)?|KEY)
      (?:.|[\n\r]){0,16}?
      \b
      (
        [A-Za-z0-9_-]{86}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_uppercase: 4
      min_lowercase: 4
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'INNGEST EVENT_KEY=AbCdEfGhIjKlMnOpQrStUvWxYz0123456789_-AbCdEfGhIjKlMnOpQrStUvWxYz0123456789_-AbCdEfGhIj'
      - 'inngest event key: "ZyXwVuTsRqPoNmLkJiHgFeDcBa9876543210_-ZyXwVuTsRqPoNmLkJiHgFeDcBa9876543210_-ZyXwVuTsRq"'
    references:
      - https://www.inngest.com/docs/events/creating-an-event-key
    # Validation sends an inert event (no function subscribes to this name).
    # The event key is only accepted at the event ingestion endpoint.
    validation:
      type: Http
      content:
        request:
          method: POST
          url: 'https://inn.gs/e/{{ TOKEN }}'
          headers:
            Content-Type: application/json
          body: '{"name": "kingfisher/validate", "data": {}}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
