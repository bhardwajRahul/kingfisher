rules:
  - name: MariaDB Credentials
    id: kingfisher.mariadb.1
    pattern: |
      (?xi)
      \b
      maria(?:db)?
      (?:.|[\n\r]){0,128}?
      \b(?:password|passwd|pass|pwd)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [^\s"']{6,128}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 1
    min_entropy: 2.8
    confidence: medium
    examples:
      - "mariadb.password=mY5ecureP4ss\n"
      - "mariadb\npassword=Tr0ub4dor&3\n"
      - "db.url=jdbc:mariadb://db.example.com mariadb.password=r8tqvmx1kp!\n"
    references:
      - https://mariadb.org/documentation/
    # No public validation endpoint: MariaDB is self-hosted;
    # the host and port are instance-specific.
