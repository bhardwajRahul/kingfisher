rules:
  - name: Brave Search API Key
    id: kingfisher.brave.1
    pattern: |
      (?x)
      \b
      (
        BSA[A-Za-z0-9_-]{24,40}
      )
      \b
    pattern_requirements:
      min_digits: 1
      min_uppercase: 2
      min_lowercase: 4
    min_entropy: 3.2
    confidence: medium
    examples:
      - BRAVE_SEARCH_API_KEY="BSAp7_Mi4q7zWv9NeL2asR0kF6hTbQx"
      - 'headers = {"X-Subscription-Token": "BSAk4_Vm8nDp3Qw7Ls0raF2jHx6ZuCt"}'
    references:
      - https://brave.com/search/api/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.search.brave.com/res/v1/web/search?q=kingfisher&count=1
          headers:
            Accept: application/json
            X-Subscription-Token: "{{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
