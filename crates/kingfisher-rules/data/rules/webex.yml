rules:
  - name: Webex Integration Client ID
    id: kingfisher.webex.1
    pattern: |
      (?xi)
      \b
      webex
      (?:.|[\n\r]){0,32}?
      \b(?:client[_-]?id|client)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [A-Fa-f0-9]{64}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: low
    visible: false
    examples:
      - "webex_client = Ac0769801df88a3535b4b018ef570b499002bda401b3b8789259a937f22d66095"
      - "WEBEX_CLIENT_ID=1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b"
    references:
      - https://developer.webex.com/docs/platform-introduction

  - name: Webex Integration Client Secret
    id: kingfisher.webex.2
    pattern: |
      (?xi)
      \b
      webex
      (?:.|[\n\r]){0,64}?
      \b(?:client[_-]?secret|secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [A-Fa-f0-9]{64}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - "webex_secret = 8ab9b3c77035e1121e2d7d64529749682b3ce5b93dc1f1e6677f0800dcf00d1e"
      - "WEBEX_CLIENT_SECRET=1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b"
    references:
      - https://developer.webex.com/docs/platform-introduction
      - https://developer.webex.com/docs/integrations
