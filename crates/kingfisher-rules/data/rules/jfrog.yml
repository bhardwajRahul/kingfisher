rules:
  - name: JFrog Cloud Host
    id: kingfisher.jfrog.1
    pattern: |
      (?xi)
      \b
      (
        [a-z0-9]
        (?:
          [a-z0-9\-]{0,61}
          [a-z0-9]
        )?
        \.jfrog\.io
      )
      \b
    min_entropy: 2.5
    confidence: medium
    visible: false
    examples:
      - company.jfrog.io
      - my-team.jfrog.io
    references:
      - https://jfrog.com/help/api/khub/documents/xrOb4ANk_fqUw5nctnsIww/content

  - name: JFrog API Key
    id: kingfisher.jfrog.2
    pattern: |
      (?xi)
      \b
      (?:
        jfrog |
        artifactory |
        bintray |
        xray
      )
      (?:.|[\n\r]){0,32}?
      (?:
        api[_-]?key |
        password |
        token |
        secret
      )
      (?:.|[\n\r]){0,12}?
      (
        [A-Za-z0-9]{73}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_uppercase: 2
      min_lowercase: 6
    min_entropy: 3.5
    confidence: medium
    examples:
      - jfrog_api_key=Ab12Cd34Ef56Gh78Ij90Kl12Mn34Op56Qr78St90Uv12Wx34Yz56Ab78Cd90Ef12Gh34Ij5Kl
      - jfrog_password=Ab12Cd34Ef56Gh78Ij90Kl12Mn34Op56Qr78St90Uv12Wx34Yz56Ab78Cd90Ef12Gh34Ij5Kl
    references:
      - https://jfrog.com/help/api/khub/documents/xrOb4ANk_fqUw5nctnsIww/content
      - https://jfrog.com/article/access-service/
    depends_on_rule:
      - rule_id: kingfisher.jfrog.1
        variable: JFROG_HOST
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://{{ JFROG_HOST }}/artifactory/api/repositories
          headers:
            X-JFrog-Art-Api: '{{ TOKEN }}'
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid

  - name: JFrog Identity Token
    id: kingfisher.jfrog.3
    pattern: |
      (?xi)
      \b
      (?:
        jfrog |
        artifactory |
        bintray |
        xray
      )
      (?:.|[\n\r]){0,32}?
      (?:
        identity[_-]?token |
        access[_-]?token |
        bearer |
        token
      )
      (?:.|[\n\r]){0,12}?
      (
        [A-Za-z0-9]{64}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_uppercase: 2
      min_lowercase: 6
    min_entropy: 3.4
    confidence: medium
    examples:
      - jfrog_identity_token=Ab12Cd34Ef56Gh78Ij90Kl12Mn34Op56Qr78St90Uv12Wx34Yz56Ab78Cd90Ef12
      - artifactory_access_token=Zx12Cv34Bn56Mm78Aa90Ss12Dd34Ff56Gg78Hh90Jj12Kk34Ll56Qq78Ww90Ee12
    references:
      - https://jfrog.com/help/api/khub/documents/xrOb4ANk_fqUw5nctnsIww/content
      - https://jfrog.com/article/access-service/
    depends_on_rule:
      - rule_id: kingfisher.jfrog.1
        variable: JFROG_HOST
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://{{ JFROG_HOST }}/artifactory/api/repositories
          headers:
            Authorization: 'Bearer {{ TOKEN }}'
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
