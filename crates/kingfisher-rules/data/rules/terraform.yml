rules:
  - name: Terraform Cloud / HCP Terraform API Token
    id: kingfisher.terraform.1
    pattern: |
      (?x)
      \b
      (
        [A-Za-z0-9]{1,32}
        \.atlasv1\.
        [A-Za-z0-9_-]{60,90}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: high
    examples:
      - "TERRAFORM_TOKEN=aBcDeF.atlasv1.AbCdEfGhIjKlMnOpQrStUvWxYz1234567890abcdefghijklmnopqrstuvwxyz0123"
      - "token = \"xK9mP2.atlasv1.qRsT4wY6zA1cD3eF5gH7iJ0kLmN8oPqR2sT5uV7wX9yZ1aB3cD6eF8g\""
    references:
      - https://developer.hashicorp.com/terraform/cloud-docs/users-teams-organizations/api-tokens
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://app.terraform.io/api/v2/account/details
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Content-Type: application/vnd.api+json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
