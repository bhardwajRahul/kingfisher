rules:
  - name: Ubidots API Key
    id: kingfisher.ubidots.1
    pattern: |
      (?x)
      \b
      (
        BBUS-
        [A-Za-z0-9]{28,40}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: high
    examples:
      - "API_KEY = \"BBUS-kDvT2Vrm6JThnHZvgzNyO2K7DAHdWs12abc\""
      - "UBIDOTS_TOKEN=BBUS-AbCdEfGhIjKlMnOpQrStUvWxYz0123456"
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://industrial.api.ubidots.com/api/v2.0/devices
          headers:
            Accept: application/json
            X-Auth-Token: "{{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              match_all_words: false
              words:
                - '"count"'
                - '"results"'
    references:
      - https://docs.ubidots.com/reference/authentication
      - https://docs.ubidots.com/reference/get-devices
