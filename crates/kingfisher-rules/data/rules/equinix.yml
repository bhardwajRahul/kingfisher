rules:
  - name: Equinix Metal / Packet API Token
    id: kingfisher.equinix.1
    pattern: |
      (?xi)
      \b
      (?:PACKET_API_TOKEN|EQUINIX(?:_PACKET)?_API_TOKEN|equinix)
      (?:.|[\n\r]){0,32}?
      [=:"'\s]
      ['"]*
      (
        [A-Za-z0-9]{28,36}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 2
      min_uppercase: 2
      min_lowercase: 4
    min_entropy: 3.5
    confidence: high
    examples:
      - "export PACKET_API_TOKEN=bRniGMGkhjH0x2a0aHdxddyNDReH7Za3\n"
      - "EQUINIX_PACKET_API_TOKEN=cSojHNHliII1y3b1bIeyeezOESiH8Ab4\n"
    references:
      - https://metal.equinix.com/developers/api/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.equinix.com/metal/v1/user
          headers:
            X-Auth-Token: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
