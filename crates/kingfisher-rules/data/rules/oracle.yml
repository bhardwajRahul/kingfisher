rules:
  - name: Oracle Database Connection URI
    id: kingfisher.oracle.1
    pattern: |
      (?xi)
      \b
      oracle://
      ([^:@\s]{1,64})
      :
      ([^@\s]{6,128})
      @
      [^\s/"']{4,128}
    pattern_requirements:
      min_digits: 2
    min_entropy: 2.5
    confidence: medium
    examples:
      - "CONNECTION_URI=\"oracle://dbuser:Tr0ub4dor&3@prod-db.example.com:1521/orcl\""
      - "ORACLE_URL=oracle://root:p53pgsx0pf@db.internal:5434/mydb"
    references:
      - https://docs.oracle.com/en/database/oracle/oracle-database/index.html
    # No public validation endpoint: Oracle DB is self-hosted; the host
    # and port are instance-specific and not publicly resolvable.
