rules:
  - name: SMB / CIFS Connection URI
    id: kingfisher.smb.1
    pattern: |
      (?xi)
      \b
      smb://
      ([^:@\s]{1,64})
      :
      ([^@\s]{6,128})
      @
      [^\s/"']{4,128}
    pattern_requirements:
      min_digits: 2
    min_entropy: 2.5
    confidence: medium
    examples:
      - "smb://alice:pf8rms3018@192.168.1.10/share/path"
      - "SMB_URL=smb://administrator:P4ssw0rd!@fileserver.corp.example.com/data"
    references:
      - https://learn.microsoft.com/en-us/openspecs/windows_protocols/ms-cifs/d416ff7c-c536-406e-a951-4f04b2fd1d2b
    # No public validation endpoint: SMB servers are self-hosted;
    # the host is instance-specific.
