rules:
  - name: Liveblocks Secret Key
    id: kingfisher.liveblocks.1
    pattern: |
      (?x)
      \b
      (
        sk_(?:prod|dev)_[A-Za-z0-9_-]{64}
      )
      (?:\b|$)
    pattern_requirements:
      min_digits: 1
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'LIVEBLOCKS_SECRET_KEY=sk_prod_a1B2c3D4e5F6g7H8i9J0k1L2m3N4o5P6q7R8s9T0_-a1B2c3D4e5F6g7H8i9J0k1'
      - 'LIVEBLOCKS_SECRET_KEY="sk_dev_Z9y8X7w6V5u4T3s2R1qPoNmLkJiHgFeDcBa9876543210_-Z9y8X7w6V5u4T3s2R"'
    references:
      - https://liveblocks.io/docs/api-reference/rest-api-endpoints
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.liveblocks.io/v2/rooms?limit=1
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
