rules:
  - name: Tavus API Key
    id: kingfisher.tavus.1
    pattern: |
      (?xi)
      \b
      (?:tavus|tavusapi\.com)
      (?:.|[\n\r]){0,48}?
      (?:x-api-key|api[_\s-]*key|token|secret|key)
      (?:.|[\n\r]){0,24}?
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.6
    confidence: medium
    examples:
      - 'TAVUS_API_KEY="4a7b9c0d1e2f33445566778899aabbcc"'
      - 'headers = {"provider": "tavus", "x-api-key": "9f8e7d6c5b4a3210fedcba9876543210"}'
    references:
      - https://docs.tavus.io/api-reference/authentication
      - https://docs.tavus.io/api-reference/conversations/get-conversations
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://tavusapi.com/v2/conversations
          headers:
            x-api-key: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
