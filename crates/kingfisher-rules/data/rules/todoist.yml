rules:
  - name: Todoist API Token
    id: kingfisher.todoist.1
    pattern: |
      (?x)
      \b
      (?i:todoist)
      (?:.|[\n\r]){0,32}?
      \b
      (
        [0-9a-f]{40}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'TODOIST_API_TOKEN="9ee0e268956ee8440fd88cf1a54665f01fcfcdf5"'
      - |
        todoist_token = '6c387dbc97170767f2e80334a5e822895adf6d7b'
    negative_examples:
      - 'TODOIST_URL="https://api.todoist.com"'
    references:
      - https://developer.todoist.com/api/v1/
      - https://developer.todoist.com/guides/#developing-with-todoist
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.todoist.com/api/v1/projects
          headers:
            Authorization: 'Bearer {{ TOKEN }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
