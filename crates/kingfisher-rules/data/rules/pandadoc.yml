rules:
  - name: PandaDoc API Key
    id: kingfisher.pandadoc.1
    pattern: |
      (?x)
      \b
      (?i:pandadoc)
      (?:.|[\n\r]){0,32}?
      \b
      (
        [a-zA-Z0-9]{40}
      )
      \b
    pattern_requirements:
      min_digits: 3
      min_lowercase: 3
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'PANDADOC_API_KEY=3039ba033eb1410caa0a2227158d63c9d6502cd8'
    references:
      - https://developers.pandadoc.com/reference/api-key-authentication-process
      - https://developers.pandadoc.com/openapi/pandadoc-public-api.json
      - https://developers.pandadoc.com/reference/current-member-details
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.pandadoc.com/public/v1/members/current
          headers:
            Accept: application/json
            Authorization: "API-Key {{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
