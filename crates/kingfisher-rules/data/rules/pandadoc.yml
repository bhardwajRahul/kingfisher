rules:
  - name: PandaDoc API Key
    id: kingfisher.pandadoc.1
    pattern: |
      (?xi)
      \b(?:pandadoc)
      (?:.|[\n\r]){0,32}?
      (?:API[_-]?KEY|SECRET|TOKEN|KEY)
      (?:.|[\n\r]){0,16}?
      \b
      (
        [a-zA-Z0-9]{40}
      )
      \b
    pattern_requirements:
      min_digits: 3
      min_uppercase: 3
      min_lowercase: 3
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'PANDADOC_API_KEY=aBcDeFgHiJkLmNoPqRsTuVwXyZ01234567890abc'
    references:
      - https://developers.pandadoc.com/reference/about
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.pandadoc.com/public/v1/documents?count=1
          headers:
            Accept: application/json
            Authorization: "API-Key {{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
