rules:
  - name: Jira Domain
    id: kingfisher.jira.1
    pattern: |
      (?xi)    
      \b               
      (
        [a-z][a-z0-9-]{5,24}\.atlassian\.net
      )
      \b
    min_entropy: 3.5
    visible: false
    confidence: medium
    examples:
      - examplefoo-jira.atlassian.net
      - jira.sprintUri= https://example.atlassian.net/rest
    references:
      - https://developer.atlassian.com/cloud/jira/platform/rest/v3/intro/

  - name: Jira Token
    id: kingfisher.jira.2
    pattern: |
      (?xi)                   
      \b                     
      jira
      (?:.|[\n\r]){0,8}?
      (?:SECRET|PRIVATE|ACCESS|KEY|PASSWORD|TOKEN)
      (?:.|[\n\r]){0,16}?
      \b                     
      (                      
        [a-z0-9-]{24}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.3
    confidence: medium
    examples:
      - 'Here is my Jira token: VDOheDe1sSCeGkuTARhkFDE2'
      - public static final String JIRA_PASSWORD = "VDOheDe1sSCeGkuTARhkFDE2";
    validation:
      type: Http
      content:
        request:
          headers:
            Accept: application/json
            Authorization: Basic {{ TOKEN }}
          method: GET
          response_matcher:
            - report_response: true
            - status:
                - 200
              type: StatusMatch
          url: '{{ JIRA_CLOUD_BASE_URL }}/rest/api/3/dashboard'
    references:
      - https://developer.atlassian.com/cloud/jira/platform/basic-auth-for-rest-apis/
    depends_on_rule:
      - rule_id: kingfisher.jira.1
        variable: DOMAIN
  - name: Jira Data Center Personal Access Token
    id: kingfisher.jira.3
    pattern: |
      (?x)
      (?i:jira|atlassian)
      (?:.|[\n\r]){0,16}?
      \b
      (
        [MNO][A-Za-z0-9+/]{15}
        O[g-v]
        [A-Za-z0-9+/]{26}
      )
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 4.0
    confidence: medium
    examples:
      - 'jira_token: "Mjc2NTIyMTkxNTY2OkurZAe0a40+xLE2fJRBcq/P2vsL"'
      - 'atlassian_PAT=OTI0NTIyOQkzMTk3OgyypbjdwdDzTavLf2R1Ls0XJAPm'
    references:
      - https://confluence.atlassian.com/enterprise/using-personal-access-tokens-1026032365.html
      - https://developer.atlassian.com/server/jira/platform/personal-access-token/
    validation:
      type: Http
      content:
        request:
          headers:
            Accept: application/json
            Authorization: Bearer {{ TOKEN }}
          method: GET
          response_matcher:
            - report_response: true
            - status:
                - 200
              type: StatusMatch
            - type: JsonValid
          url: '{{ JIRA_BASE_URL }}/rest/api/latest/myself'
    revocation:
      type: HttpMultiStep
      content:
        steps:
          - name: lookup_token_id
            request:
              method: GET
              url: '{{ JIRA_BASE_URL }}/rest/pat/latest/tokens'
              headers:
                Accept: application/json
                Authorization: Bearer {{ TOKEN }}
              response_matcher:
                - type: StatusMatch
                  status: [200]
                - type: JsonValid
            extract:
              JIRA_TOKEN_ID:
                type: JsonPath
                path: "$[0].id"
          - name: revoke_token
            request:
              method: DELETE
              url: '{{ JIRA_BASE_URL }}/rest/pat/latest/tokens/{{ JIRA_TOKEN_ID }}'
              headers:
                Authorization: Bearer {{ TOKEN }}
              response_matcher:
                - report_response: true
                - type: StatusMatch
                  status: [204]
    depends_on_rule:
      - rule_id: kingfisher.jira.4
        variable: JIRADCDOMAIN

  - name: Jira Data Center Domain
    id: kingfisher.jira.4
    pattern: |
      (?xi)
      (?:https?://)?
      \b
      (
        (?:[a-z0-9-]+\.){0,16}
        jira[a-z0-9-]*
        \.[a-z0-9.-]{2,64}
        (?::\d{2,5})?
      )
      \b
    min_entropy: 2.5
    visible: false
    confidence: medium
    examples:
      - jira.example.com
      - jira-staging.corp.mongodb.com
      - https://jira.corp.internal:8443
    references:
      - https://confluence.atlassian.com/adminjiraserver/jira-applications-base-url-938846869.html
