rules:
  - name: RunPod API Key
    id: kingfisher.runpod.1
    pattern: |
      (?x)
      \b
      (
        rpa_[A-Z0-9]{40}[A-Za-z0-9]{6}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.5
    confidence: high
    categories: [api, key]
    examples:
      - 'RUNPOD_API_KEY=rpa_ABC123DEF456GHI789JKL012MNO345PQR678STUVX9y2z7'
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://api.runpod.io/graphql
          headers:
            Authorization: Bearer {{ TOKEN }}
            Content-Type: application/json
          body: '{"query":"{ myself { id } }"}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: WordMatch
              match_all_words: true
              words: ['"myself"']
    references:
      - https://docs.runpod.io/get-started/api-keys
