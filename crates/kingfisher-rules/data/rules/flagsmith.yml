rules:
  - name: Flagsmith Server-Side Environment Key
    id: kingfisher.flagsmith.1
    pattern: |
      (?x)
      \b
      (?i:flagsmith)
      [^\n\r]{0,16}?
      \b
      (
        ser\.[A-Za-z0-9]{24,48}
      )
      \b
    pattern_requirements:
      min_digits: 1
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'FLAGSMITH_SERVER_SIDE_ENVIRONMENT_KEY=ser.xK8m2LpQr5nW0vYz3cJ7aB4dE6fG8h'
      - 'X-Environment-Key: ser.a1b2C3d4E5f6G7h8I9j0K1l2'
    references:
      - https://docs.flagsmith.com/clients/server-side
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://edge.api.flagsmith.com/api/v1/flags/
          headers:
            X-Environment-Key: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
  - name: Flagsmith Environment Key
    id: kingfisher.flagsmith.2
    pattern: |
      (?xi)
      \b
      flagsmith
      [^\n\r]{0,16}?
      \b
      (
        [a-f0-9]{20}[a-f0-9]{20}
      )
      \b
    pattern_requirements:
      min_digits: 6
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'FLAGSMITH_SERVER_SIDE_ENVIRONMENT_KEY=103edeabc2a901041329b22da61d09cf466cf733'
      - 'flagsmith environment key: 65ea217e98f87d37152e4897896108e976bcf053'
      - 'flagsmith api token=62612be866d95626691158801ea28a10bc2bafab'
    references:
      - https://docs.flagsmith.com/integrating-with-flagsmith/flagsmith-api-overview/flags-api/authentication
      - https://docs.flagsmith.com/clients/server-side
    # Flagsmith documents public client-side Environment Keys for the Flags API
    # and separate `ser.` server-side keys for the Environment Document flow.
    # The 40-hex keys matched here do not have a reliable documented token-only
    # validation endpoint, so validation is intentionally omitted to avoid false
    # "inactive credential" results.
