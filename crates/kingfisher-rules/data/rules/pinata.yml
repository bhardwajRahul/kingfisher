rules:
  - name: Pinata API Key ID
    id: kingfisher.pinata.1
    pattern: |
      (?x)
      (?:
        (?i:pinata)\s+API\s+Key
        |
        PINATA_API_KEY
        |
        API\s+Key
      )
      \s*[:=]\s*
      (
        [0-9a-f]{20}
      )
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.3
    visible: false
    confidence: medium
    examples:
      - 'PINATA_API_KEY=017bb392dcfe1fcfe009'
      - 'API Key: 017bb392dcfe1fcfe009'

  - name: Pinata API Secret
    id: kingfisher.pinata.2
    pattern: |
      (?x)
      (?:
        (?i:pinata)\s+API\s+Secret
        |
        PINATA_API_SECRET
        |
        API\s+Secret
      )
      \s*[:=]\s*
      (
        [0-9a-f]{64}
      )
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - 'PINATA_API_SECRET=f0e1d2c3b4a5f6e7d8c9b0a1f2e3d4c5b6a7f8e9d0c1b2a3f4e5d6c7b8a9f0e1'
      - 'API Secret: c9c7663470ffe6a11d2e9ef607ba32954e4ea3da7d7e662650d0eba8bcc2801f'
    references:
      - https://docs.pinata.cloud/api-reference/introduction
      - https://docs.pinata.cloud/account-management/api-keys
    depends_on_rule:
      - rule_id: kingfisher.pinata.1
        variable: PINATA_API_KEY_ID
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.pinata.cloud/data/testAuthentication
          headers:
            Accept: application/json
            pinata_api_key: "{{ PINATA_API_KEY_ID }}"
            pinata_secret_api_key: "{{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: WordMatch
              words:
                - '"message"'
                - 'Congratulations'

  - name: Pinata JWT
    id: kingfisher.pinata.3
    pattern: |
      (?x)
      (?i:pinata)
      (?:.|[\n\r]){0,32}?
      \b
      (
        (?:ey|ewogIC)[A-Za-z0-9_-]{12,512}
        \.
        ey[A-Za-z0-9_-]{0,512}
        \.
        [A-Za-z0-9_-]{24,512}
      )
      (?:[^A-Za-z0-9_-]|$)
    min_entropy: 3.3
    confidence: medium
    examples:
      - 'PINATA_JWT=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MDc5MTQxNjAsImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjAxN2JiMzkyZGNmZTFmY2ZlMDA5Iiwic2NvcGVkS2V5U2VjcmV0IjoiYzljNzY2MzQ3MGZmZTZhMTFkMmU5ZWY2MDdiYTMyOTU0ZTRlYTNkYTdkN2U2NjI2NTBkMGViYThiY2MyODAxZiJ9.abcdefghijklmnopqrstuvwxyzABCDEF'
      - 'API Secret: c9c7663470ffe6a11d2e9ef607ba32954e4ea3da7d7e662650d0eba8bcc2801f JWT: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MDc5MTQxNjAsImF1dGhlbnRpY2F0aW9uVHlwZSI6InNjb3BlZEtleSIsInNjb3BlZEtleUtleSI6IjAxN2JiMzkyZGNmZTFmY2ZlMDA5Iiwic2NvcGVkS2V5U2VjcmV0IjoiYzljNzY2MzQ3MGZmZTZhMTFkMmU5ZWY2MDdiYTMyOTU0ZTRlYTNkYTdkN2U2NjI2NTBkMGViYThiY2MyODAxZiJ9.abcdefghijklmnopqrstuvwxyzABCDEF'
    references:
      - https://docs.pinata.cloud/account-management/api-keys
      - https://docs.pinata.cloud/api-reference/endpoint/ipfs/test-authentication
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.pinata.cloud/data/testAuthentication
          headers:
            Accept: application/json
            Authorization: "Bearer {{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: WordMatch
              words:
                - '"message"'
                - 'Congratulations'
