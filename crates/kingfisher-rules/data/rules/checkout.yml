rules:
  - name: Checkout.com Secret Key
    id: kingfisher.checkout.1
    pattern: |
      (?x)
      \b
      (
        sk_
        (?:[a-f0-9]{8}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{12})
      )
      \b
    pattern_requirements:
      min_digits: 8
    min_entropy: 3.2
    confidence: high
    examples:
      - "const cko = new Checkout('sk_0b9b5db6-fabc-49d0-b68f-13343bb4f708')"
      - "Authorization: sk_be458ac1-fabc-4194-bf58-123b5fae88c7"
    references:
      - https://api-reference.checkout.com
      - https://www.checkout.com/docs/payments/accept-payments/accept-a-payment-via-api
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.checkout.com/workflows
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true

  - name: Checkout.com Sandbox Secret Key
    id: kingfisher.checkout.2
    pattern: |
      (?x)
      \b
      (
        sk_test_
        [a-f0-9]{8}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 8
    min_entropy: 3.2
    confidence: high
    examples:
      - "CKO_SECRET_KEY=sk_test_2a3b4c5d-1234-5678-abcd-ef0123456789"
    references:
      - https://api-reference.checkout.com
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.sandbox.checkout.com/workflows
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
