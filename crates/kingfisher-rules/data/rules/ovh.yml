rules:
  - name: OVH Application Key
    id: kingfisher.ovh.1
    pattern: |
      (?xi)
      \b
      (?:ovh|ovhcloud)
      (?:.|[\n\r]){0,32}?
      \b(?:application[_-]?key|app[_-]?key)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [A-Za-z0-9]{16}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 2
      min_lowercase: 4
    min_entropy: 3.0
    confidence: low
    visible: false
    examples:
      - "[ovh-eu]\napplication_key=H4JXYD1BdSZzoY8m"
      - "OVH_APPLICATION_KEY=K3IXYC0BeSZzoY6i"
    references:
      - https://api.ovh.com/

  - name: OVH Application Secret
    id: kingfisher.ovh.2
    pattern: |
      (?xi)
      \b
      (?:ovh|ovhcloud)
      (?:.|[\n\r]){0,64}?
      \b(?:application[_-]?secret|app[_-]?secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 2
      min_lowercase: 8
    min_entropy: 3.5
    confidence: medium
    examples:
      - "application_secret=r4DVZuOvp8Acg18fMF1LLd7KapVFc7Qz"
      - "OVH_APPLICATION_SECRET=AbCdEf1234GhIjKl5678MnOpQr90StUv"
    references:
      - https://api.ovh.com/
      - https://api.ovh.com/console/#/me/api/application/%7BapplicationId%7D#DELETE
    # No simple validation: OVH API uses time-based HMAC-SHA1 request signing
    # with application_key, consumer_key, timestamp, and method. Cannot
    # validate with a static header approach.
