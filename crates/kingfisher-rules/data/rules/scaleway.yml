rules:
  - name: Scaleway Secret Key
    id: kingfisher.scaleway.1
    pattern: |
      (?xi)
      \b
      scaleway
      (?:.|[\n\r]){0,64}?
      \b(?:token|secret[_-]?key|auth)\b
      (?:.|[\n\r]){0,32}?
      [=:"'\s]
      \b
      (
        [a-f0-9]{8}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 6
    min_entropy: 3.0
    confidence: medium
    examples:
      - "scaleway token 56bd4fd9-f2db-b40d-a2b4-bfde7fab5ed3"
      - "scaleway\nsecret_key=b7c3f1d9-8a5e-4b02-92f6-10db7e431abc"
    references:
      - https://developers.scaleway.com/en/
      - https://www.scaleway.com/en/developers/api/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.scaleway.com/iam/v1alpha1/api-keys
          headers:
            X-Auth-Token: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
