rules:
  - name: Zoom OAuth Client ID
    id: kingfisher.zoom.1
    pattern: |
      (?xi)
      \b
      zoom
      (?:.|[\n\r]){0,64}?
      \b(?:client[_-]?id|app[_-]?id|api[_-]?key|auth[_-]?id|auth[_-]?client)\b
      (?:.|[\n\r]){0,32}?
      [=:"'\s]
      \b
      (
        [A-Za-z0-9_-]{20,24}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 2
      min_lowercase: 2
    min_entropy: 3.2
    confidence: low
    visible: false
    examples:
      - ZOOM_AUTH_ID=Tv5sLk45Qc2W3DVSw41ZzQ
      - 'zoom_client_id = "BcrAjn6FTQyBtM9Wj7Cmw"'
    references:
      - https://developers.zoom.us/docs/integrations/

  - name: Zoom OAuth Client Secret
    id: kingfisher.zoom.2
    pattern: |
      (?xi)
      \b
      zoom
      (?:.|[\n\r]){0,64}?
      \b(?:client[_-]?secret|api[_-]?secret|auth[_-]?secret)\b
      (?:.|[\n\r]){0,32}?
      [=:"'\s]
      \b
      (
        [A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_uppercase: 2
      min_lowercase: 2
    min_entropy: 3.5
    confidence: medium
    examples:
      - ZOOM_AUTH_SECRET=9NeGUzYkSjRupIF5pt93m2D1w17fOjI8
      - '"ZOOM_API_SECRET": "ihPmh3dnXxn3Cd7s3UVZoCDvVEef1f1Q"'
    references:
      - https://developers.zoom.us/docs/integrations/
      - https://developers.zoom.us/docs/integrations/oauth-scopes-overview/
