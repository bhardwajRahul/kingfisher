rules:
  - name: E2B API Key
    id: kingfisher.e2b.1
    pattern: |
      (?x)
      \b
      (
        e2b_[a-f0-9]{40}
      )
      \b
    pattern_requirements:
      min_digits: 1
    min_entropy: 3.0
    confidence: medium
    examples:
      - 'E2B_API_KEY=e2b_5f088ea8ea8502827d3d7d79448bdf75e4fe3c37'
      - 'X-API-Key: e2b_d3b87681ab9d0b856a22de1c64e0dbc07f673a3e'
    references:
      - https://e2b.dev/docs/getting-started/api-key
      - https://e2b.dev/docs/api-reference/sandboxes/list-sandboxes
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.e2b.dev/sandboxes
          headers:
            X-API-Key: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
