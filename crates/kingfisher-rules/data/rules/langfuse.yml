rules:
  - name: Langfuse Secret Key
    id: kingfisher.langfuse.1
    pattern: |
      (?x)
      \b
      (
        sk-lf-[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}
      )
      \b
    pattern_requirements:
      min_digits: 1
      min_lowercase: 1
    min_entropy: 3.0
    confidence: medium
    examples:
      - sk-lf-a1b2c3d4-e5f6-7890-abcd-ef1234567890
      - 'LANGFUSE_SECRET_KEY="sk-lf-9f8e7d6c-5b4a-3210-fedc-ba0987654321"'
    negative_examples:
      - sk-lf-test
      - sk-lf-
    references:
      - https://langfuse.com/docs/sdk/typescript
      - https://langfuse.com/docs/get-started
    depends_on_rule:
      - rule_id: kingfisher.langfuse.2
        variable: PUBLIC_KEY
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://cloud.langfuse.com/api/public/projects
          headers:
            Authorization: 'Basic {{ PUBLIC_KEY | append: ":" | append: TOKEN | b64enc }}'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid

  - name: Langfuse Public Key
    id: kingfisher.langfuse.2
    pattern: |
      (?x)
      \b
      (
        pk-lf-[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}
      )
      \b
    pattern_requirements:
      min_digits: 1
      min_lowercase: 1
    min_entropy: 3.0
    confidence: medium
    visible: false
    examples:
      - pk-lf-a1b2c3d4-e5f6-7890-abcd-ef1234567890
      - 'LANGFUSE_PUBLIC_KEY="pk-lf-9f8e7d6c-5b4a-3210-fedc-ba0987654321"'
    references:
      - https://langfuse.com/docs/sdk/typescript
      - https://langfuse.com/docs/get-started
