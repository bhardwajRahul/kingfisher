rules:
  - name: KuCoin API Key
    id: kingfisher.kucoin.1
    pattern: |
      (?xi)
      \b
      kucoin
      (?:.|[\n\r]){0,32}?
      (?:
        api[_-]?key |
        key
      )
      (?:.|[\n\r]){0,12}?
      (
        [a-f0-9]{24}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_lowercase: 8
      ignore_if_contains:
        - xxxxxx
        - your_api_key
    min_entropy: 3.0
    confidence: medium
    examples:
      - KUCOIN_API_KEY=4f4ecb6f11b1a70001c8e2ff
      - 'kucoin_api_key: a1b2c3d4e5f60718293a4b5c'
    references:
      - https://www.kucoin.com/docs-new/authentication
      - https://www.kucoin.com/docs-new/api-3470125

  - name: KuCoin API Secret
    id: kingfisher.kucoin.2
    pattern: |
      (?xi)
      \b
      kucoin
      (?:.|[\n\r]){0,32}?
      (?:
        api[_-]?secret |
        secret
      )
      (?:.|[\n\r]){0,12}?
      (
        [a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 6
      min_lowercase: 8
      ignore_if_contains:
        - 00000000-0000-0000-0000-000000000000
        - xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    min_entropy: 3.3
    confidence: medium
    examples:
      - KUCOIN_API_SECRET=7d70f6c7-42e9-4261-8a8d-8ca2d5028d4f
      - 'kucoin_secret: a1b2c3d4-e5f6-7890-abcd-ef1234567890'
    references:
      - https://www.kucoin.com/docs-new/authentication

