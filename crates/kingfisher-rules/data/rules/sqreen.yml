rules:
  - name: Sqreen Token
    id: kingfisher.sqreen.1
    pattern: |
      (?x)
      \b
      (
        org_
        [0-9a-f]{56,64}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: high
    examples:
      - "sqreen-install.sh 'org_9ce0e9cdbc0cda31efe49c21b18621c3c7ee0bd6897578d7b3e0e99204f0bcde'"
      - "SQREEN_TOKEN=org_2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c"
    references:
      - https://docs.sqreen.com/
    # No public validation endpoint available.
