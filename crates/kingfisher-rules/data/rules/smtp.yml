rules:
  - name: SMTP Credentials
    id: kingfisher.smtp.1
    pattern: |
      (?xi)
      \b
      (?:email[_-]?host[_-]?password|smtp[_-]?password|smtp[_-]?pass)
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [^\s"']{6,128}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 1
    min_entropy: 2.8
    confidence: medium
    examples:
      - "EMAIL_HOST_PASSWORD = Nftu435p2634\n"
      - "smtp_password = s3cureEmAilP@ss\n"
      - "EMAIL_HOST_PASSWORD=aXyz789#Secure\n"
    references:
      - https://datatracker.ietf.org/doc/html/rfc5321
    # No public validation endpoint: SMTP credentials are server-specific.
