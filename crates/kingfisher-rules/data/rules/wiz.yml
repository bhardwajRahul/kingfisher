rules:
  - name: Wiz Client ID
    id: kingfisher.wiz.1
    pattern: |
      (?x)
      \b
      (?i:wiz)
      (?:.|[\n\r]){0,32}?
      (?i:CLIENT.?ID)
      (?:.|[\n\r]){0,32}?
      \b
      (
        [a-zA-Z0-9]{53}
      )
      \b
    pattern_requirements:
      min_digits: 3
      min_uppercase: 3
      min_lowercase: 3
    min_entropy: 4.0
    confidence: medium
    visible: false
    examples:
      - 'WIZ_CLIENT_ID="aB1cD2eF3gH4iJ5kL6mN7oP8qR9sT0uV1wX2yZ3aA4bB5cC6dD7eF"'
    negative_examples:
      - 'WIZ_URL="https://app.wiz.io"'
    references:
      - https://docs.wiz.io/wiz-docs/docs/using-the-wiz-api

  - name: Wiz Client Secret
    id: kingfisher.wiz.2
    pattern: |
      (?x)
      \b
      (?i:wiz)
      (?:.|[\n\r]){0,32}?
      (?i:CLIENT.?SECRET|SECRET)
      (?:.|[\n\r]){0,32}?
      \b
      (
        [a-zA-Z0-9]{64}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_uppercase: 4
      min_lowercase: 4
    min_entropy: 4.0
    confidence: medium
    depends_on_rule:
      - rule_id: kingfisher.wiz.1
        variable: CLIENT_ID
    examples:
      - 'WIZ_CLIENT_SECRET="aB1cD2eF3gH4iJ5kL6mN7oP8qR9sT0uV1wX2yZ3aA4bB5cC6dD7eE8fF9gG0hH1i"'
    negative_examples:
      - 'WIZ_URL="https://app.wiz.io"'
    references:
      - https://docs.wiz.io/wiz-docs/docs/using-the-wiz-api
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://auth.app.wiz.io/oauth/token
          headers:
            Content-Type: application/x-www-form-urlencoded
          body: 'grant_type=client_credentials&client_id={{ CLIENT_ID }}&client_secret={{ TOKEN }}&audience=wiz-api'
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
