rules:
  - name: Thunderstore API Token
    id: kingfisher.thunderstore.1
    pattern: |
      (?x)
      \b
      (
        tss_[a-zA-Z0-9_-]{20,80}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.5
    confidence: medium
    categories: [api, key]
    examples:
      - 'THUNDERSTORE_TOKEN=tss_AbCdEfGhIjKlMnOpQrStUvWxYz123456'
    references:
      - https://thunderstore.io/api/docs/
