rules:
  - name: Etsy Open API Key
    id: kingfisher.etsy.1
    pattern: |
      (?xi)
      \b
      (?:
        etsy
        (?:.|[\n\r]){0,32}?
        (?:
          api[_-]?key |
          keystring |
          x-api-key
        )
      |
        x-api-key
      )
      (?:.|[\n\r]){0,12}?
      (
        [a-z0-9]{24}:[A-Za-z0-9]{10,64}
      )
      \b
    pattern_requirements:
      min_digits: 4
      min_lowercase: 8
      ignore_if_contains:
        - your_api_key
        - your_key_here
        - placeholder
    min_entropy: 3.4
    confidence: medium
    examples:
      - 'x-api-key: 1aa2bb33c44d55eeeeee6fff:a1b2c3d4e5'
      - ETSY_API_KEY=1aa2bb33c44d55eeeeee6fff:a1b2c3d4e5
    references:
      - https://developers.etsy.com/documentation/tutorials/quickstart/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.etsy.com/v3/application/openapi-ping
          headers:
            x-api-key: '{{ TOKEN }}'
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid

