rules:
  - name: YouSign API Key
    id: kingfisher.yousign.1
    pattern: |
      (?xi)
      \b
      yousign[_-]?api[_-]?key
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [a-f0-9]{32}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: high
    examples:
      - "yousign_api_key = \"8ib7d4cgd4483472fb898df8f520eb10\";"
      - "YOUSIGN_API_KEY=9jc8e5dhe5594583gc909e09g631fc21"
    references:
      - https://developers.yousign.com/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.yousign.app/v3/users/me
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
