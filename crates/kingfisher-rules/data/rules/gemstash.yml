rules:
  - name: Gemstash API Key
    id: kingfisher.gemstash.1
    pattern: |
      (?xi)
      :gemstash[_-]?key:
      \s*
      (
        [a-f0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: high
    examples:
      - ":gemstash_key: f485c343aec6ec5829e0b32ae74cd521"
      - ":gemstash-key: 2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e"
    references:
      - https://github.com/rubygems/gemstash
    # No public validation endpoint: Gemstash is self-hosted.
