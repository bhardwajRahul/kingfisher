rules:
  - name: Kairos API App ID
    id: kingfisher.kairos.1
    pattern: |
      (?xi)
      \b
      kairos
      (?:.|[\n\r]){0,64}?
      \b(?:app[_-]?id)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [a-f0-9]{8}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 2
    min_entropy: 2.0
    confidence: low
    visible: false
    examples:
      - "$app_id = 'a28c1ced';"
      - "KAIROS_APP_ID=b39d2dfe"
    references:
      - https://kairos.com/docs/

  - name: Kairos API Key
    id: kingfisher.kairos.2
    pattern: |
      (?xi)
      \b
      kairos
      (?:.|[\n\r]){0,64}?
      \b(?:api[_-]?key)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [a-f0-9]{32}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: medium
    examples:
      - "kairos\n$api_key = '49ca1ad77eb01f2fedc8965a8a23651e';"
      - "kairos\napi_key=5adb2be88fc12a3afed9076b9b34762f "
    references:
      - https://kairos.com/docs/
    # No public validation endpoint documented.
