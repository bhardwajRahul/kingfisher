rules:
  - name: crates.io API Key
    id: kingfisher.cratesio.1
    pattern: |
      (?x)
      \b
      (
        cio[A-Za-z0-9]{32}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.3
    confidence: medium
    examples:
      - 'Bearer: ciotgp8BGZBlX192iExSQPm0SrUlBunG8zd'
    references:
      - https://blog.rust-lang.org/2023/09/22/crates-io-usage-policy-rfc
      - https://github.com/rust-lang/crates.io/tree/main/src
      - https://doc.rust-lang.org/cargo/reference/registry-web-api.html
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://crates.io/api/v1/me
          headers:
            Authorization: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              match_all_words: true
              words: ['"id"', '"login"']
    revocation:
      type: Http
      content:
        request:
          method: DELETE
          url: https://crates.io/api/v1/tokens/current
          headers:
            Authorization: "{{ TOKEN }}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [204]
