rules:
  - name: Stripe Publishable Key
    id: kingfisher.stripe.1
    pattern: |
      (?x)
      \b
      (
        pk_live_[A-Za-z0-9]{24,128}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_uppercase: 1
      min_lowercase: 1
    min_entropy: 3.3
    confidence: medium
    examples:
      - stripe_pub_key = pk_live_HQS0j4H75XpthOW87eY1sXa2BYz3Ab
      - stripe_pub_key = pk_live_51O4GlNLQpd8Ph8H3or6Sv8fhuSPIQncX0dY318y8Hc9SYRyS4aeyrTN19ztOmAsuVZSTKNfI7RZoSOwNkLa0cwm010oLA68VFA
    references:
      - https://stripe.com/docs/api/authentication

  - name: Stripe Secret / Restricted Key
    id: kingfisher.stripe.2

    pattern: |
      (?x)
      \b
      (
        (?:sk|rk)_live_[A-Za-z0-9]{24,128}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.3
    confidence: medium
    examples:
      - stripe_secret_key = sk_live_f01c79xuuug7yodgzj5ws0h1x2kyvho3
      - stripe_secret_key = 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
      - "strp_sec_key: rk_live_4haG9YwGkL2hXqTj5pSzo8FzB3uCwE7n"
    validation:
      type: Http
      content:
        request:
          method: GET
          headers:
            Authorization: Bearer {{ TOKEN }}
            Accept: application/json
          url: https://api.stripe.com/v1/account        
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]                             
            - type: WordMatch
              words: ['"object":"account"','"id":']
    references:
      - https://stripe.com/docs/api/authentication
