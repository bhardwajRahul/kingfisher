rules:
  - name: Paddle API Key
    id: kingfisher.paddle.1
    pattern: |
      (?x)
      \b
      (
        pdl_live_apikey_
        [a-z0-9]{26}
        _
        [A-Za-z0-9]{22}
        _
        [A-Za-z0-9]{3}
      )
      \b
    pattern_requirements:
      min_digits: 2
      min_lowercase: 4
    min_entropy: 3.5
    confidence: high
    categories: [api, key]
    examples:
      - 'PADDLE_API_KEY=pdl_live_apikey_01kps076233qscw38dxz320d0e_Ab3D5fGb7Jk9LmNpQrStUv_X2z'
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.paddle.com/event-types
          headers:
            Authorization: Bearer {{ TOKEN }}
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
    references:
      - https://developer.paddle.com/api-reference/about/api-keys
      - https://developer.paddle.com/api-reference/about/authentication
