rules:
  - name: Freemius Secret Key
    id: kingfisher.freemius.1
    pattern: |
      (?xi)
      ["']secret_key["']
      \s*=>\s*
      ["']
      (
        sk_[^"' \t\r\n]{29}
      )
      ["']
    pattern_requirements:
      min_digits: 2
      min_lowercase: 6
      min_special_chars: 2
      ignore_if_contains:
        - xxxxxxxxx
        - placeholder
    min_entropy: 3.6
    confidence: medium
    examples:
      - |
          $config = array(
            "secret_key" => "sk_ubb4yN3mzqGR2x8#P7r5&@*xC$utE",
          );
    references:
      - https://freemius.com/help/documentation/wordpress-sdk/integrating-freemius-sdk/

