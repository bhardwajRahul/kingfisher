rules:
  - name: Surge.sh Deploy Token
    id: kingfisher.surge.1
    pattern: |
      (?xi)
      \b
      SURGE[_-]TOKEN
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [a-f0-9]{32}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.0
    confidence: high
    examples:
      - "export SURGE_TOKEN=g0d3gdd7d6475f32bb3d0e5c91177b80"
      - "SURGE_TOKEN=h1e4hee8e7586g43cc4e1f6da2288c91"
    references:
      - https://surge.sh/help/getting-started-with-surge
    # No public validation endpoint available.
