rules:
  - name: Bitfinex API Key
    id: kingfisher.bitfinex.1
    pattern: |
      (?xi)
      \b
      bitfinex
      (?:.|[\n\r]){0,32}?
      \b(?:api[_-]?key|key)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-zA-Z0-9]{43}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: low
    visible: false
    examples:
      - "bitfinex\nkey = 3d2c8965468f2a10a3797dafe46adcb34c1d1c294ca"
      - "bitfinex\napi-key = 1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2"
    references:
      - https://docs.bitfinex.com/docs

  - name: Bitfinex API Secret
    id: kingfisher.bitfinex.2
    pattern: |
      (?xi)
      \b
      bitfinex
      (?:.|[\n\r]){0,64}?
      \b(?:api[_-]?secret|secret)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      \b
      (
        [a-zA-Z0-9]{43}
      )
      \b
    pattern_requirements:
      min_digits: 4
    min_entropy: 3.5
    confidence: medium
    examples:
      - "bitfinex\nsecret = 8d7c3965318b8d20f7648dbda96fbfa23f4d1c449aa"
      - "bitfinex\napi-secret = 1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1d2"
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://api.bitfinex.com/v2/auth/r/wallets
          headers:
            Accept: application/json
            Content-Type: application/json
            bfx-apikey: "{{ BITFINEX_KEY }}"
            bfx-nonce: "{{ REQUEST_UNIX_MILLIS }}"
            bfx-signature: |
              {%- assign request_path = "/v2/auth/r/wallets" -%}
              {%- assign request_body = "{}" -%}
              {%- assign signature_payload = "/api" | append: request_path | append: REQUEST_UNIX_MILLIS | append: request_body -%}
              {{ signature_payload | hmac_sha384_hex: TOKEN }}
          body: "{}"
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
    depends_on_rule:
      - rule_id: kingfisher.bitfinex.1
        variable: BITFINEX_KEY
    references:
      - https://docs.bitfinex.com/docs/rest-auth
