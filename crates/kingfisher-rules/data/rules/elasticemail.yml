rules:
  - name: Elastic Email API Key
    id: kingfisher.elasticemail.1
    pattern: |
      (?xi)
      \b
      elasticemail
      (?:.|[\n\r]){0,64}?
      \b(?:api[_-]?key|apikey|key)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s>]
      \b
      (
        [a-f0-9]{8}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{4}-
        [a-f0-9]{12}
      )
      \b
    pattern_requirements:
      min_digits: 6
    min_entropy: 3.0
    confidence: medium
    examples:
      - "elasticemail\napikey => '8a2d35a4-2e83-41c2-9509-5c6e116ebc2b'"
      - "elasticemail\napi-key = 7b1f46a3-3d92-52b1-a81e-6d7f227fcd3c"
    references:
      - https://api.elasticemail.com/public/help
      - https://elasticemail.com/developers/api-documentation/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.elasticemail.com/v4/account
          headers:
            X-ElasticEmail-ApiKey: "{{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: StatusMatch
              status: [401, 403]
              negative: true
