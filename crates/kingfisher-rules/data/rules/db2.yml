rules:
  - name: IBM DB2 / AS400 Credentials
    id: kingfisher.db2.1
    pattern: |
      (?xi)
      \b
      (?:db2|as400)
      (?:.|[\n\r]){0,64}?
      \b(?:password|passwd|pass|pwd)\b
      (?:.|[\n\r]){0,16}?
      [=:"'\s]
      ['"]*
      (
        [^\s"']{6,128}
      )
      ['"\s]
    pattern_requirements:
      min_digits: 1
    min_entropy: 2.8
    confidence: medium
    examples:
      - "db.password=myStr0ngPass1"
      - "DB2_PASSWORD=r4ndP@ssw0rd"
      - "db.url=jdbc:db2://db.example.com/dev db.password=sup3rs3cr3t"
    references:
      - https://www.ibm.com/products/db2
    # No public validation endpoint: DB2 is self-hosted;
    # the host and port are instance-specific.
